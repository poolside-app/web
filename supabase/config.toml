# Functions that handle their own auth (verify HS256 admin tokens themselves)
# need to opt out of the gateway's JWT check, otherwise the gateway rejects
# the admin tokens we sign because they're not signed with Supabase's key.

# (List grows as we add Edge Functions in later migrations.)

[functions.admin_auth]
verify_jwt = false

[functions.tenants_admin]
verify_jwt = false

# Public — no auth required, this is the signup form
[functions.tenant_signup]
verify_jwt = false

# Public — tenant landing pages call this to get display_name etc.
[functions.tenant_public]
verify_jwt = false

# Per-tenant admin login — verifies bcrypt + signs HS256 JWT itself
[functions.tenant_admin_auth]
verify_jwt = false

# Per-tenant admin reads/writes — auth verified inside the function
[functions.tenant_settings]
verify_jwt = false

# Per-tenant image uploads (background photos, logos) → club-assets bucket
[functions.tenant_upload]
verify_jwt = false

# Households + members CRUD scoped to the tenant on the auth token
[functions.households_admin]
verify_jwt = false

# Per-tenant announcement posts shown on the public landing page
[functions.posts_admin]
verify_jwt = false

# Per-tenant calendar entries (parties, swim meets, closures, etc.)
[functions.events_admin]
verify_jwt = false
