# Functions that handle their own auth (verify HS256 admin tokens themselves)
# need to opt out of the gateway's JWT check, otherwise the gateway rejects
# the admin tokens we sign because they're not signed with Supabase's key.

# (List grows as we add Edge Functions in later migrations.)

[functions.admin_auth]
verify_jwt = false

[functions.tenants_admin]
verify_jwt = false

# Public — no auth required, this is the signup form
[functions.tenant_signup]
verify_jwt = false

# Public — tenant landing pages call this to get display_name etc.
[functions.tenant_public]
verify_jwt = false

# Per-tenant admin login — verifies bcrypt + signs HS256 JWT itself
[functions.tenant_admin_auth]
verify_jwt = false

# Per-tenant admin reads/writes — auth verified inside the function
[functions.tenant_settings]
verify_jwt = false

# Per-tenant image uploads (background photos, logos) → club-assets bucket
[functions.tenant_upload]
verify_jwt = false

# Households + members CRUD scoped to the tenant on the auth token
[functions.households_admin]
verify_jwt = false

# Per-tenant announcement posts shown on the public landing page
[functions.posts_admin]
verify_jwt = false

# Per-tenant calendar entries (parties, swim meets, closures, etc.)
[functions.events_admin]
verify_jwt = false

# Public iCal feed — no auth, returns text/calendar so members can subscribe
[functions.tenant_calendar_ics]
verify_jwt = false

# Member-facing email magic-link auth (start / verify / me / logout)
[functions.member_auth]
verify_jwt = false

# Per-tenant photo gallery CRUD; uploads go through tenant_upload first
[functions.photos_admin]
verify_jwt = false

# Admin-side party booking review (approve / reject / admin-cancel)
[functions.parties_admin]
verify_jwt = false

# ICS calendar import — subscriptions stored in settings.value.calendar_imports
[functions.events_import]
verify_jwt = false

# Aggregated time-saved / dollar-value metrics for the Impact admin page
[functions.tenant_metrics]
verify_jwt = false

# Per-tenant documents (handbook, applications, financials)
[functions.documents_admin]
verify_jwt = false

# Membership applications: public submit + admin review
[functions.applications]
verify_jwt = false

# Network-wide metrics for the provider analytics dashboard
[functions.provider_metrics]
verify_jwt = false

# Per-tenant audit log reader (writes happen inline in other functions)
[functions.audit_admin]
verify_jwt = false

# Bookings engine — programs (swim lessons, yoga, camp) + member sign-ups.
# Mixed surface: public list / member book / admin manage — all in one fn.
[functions.programs]
verify_jwt = false

# In-app pop-up campaigns: announcements / events / fundraisers shown as
# a modal on app open. Public list + tenant_admin CRUD.
[functions.campaigns]
verify_jwt = false

# Volunteer opportunities — one-shot signup slots (snack-bar shifts, party
# helpers, swim-meet timers). Public list + member signup + admin manage.
[functions.volunteer]
verify_jwt = false

# Guest pass packs (punch-card model) + redemption log. Atomic decrement
# via optimistic UPDATE … WHERE used_count = X to prevent over-redemption.
[functions.guest_passes]
verify_jwt = false
