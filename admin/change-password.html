<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Change password — Poolside</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow:0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
  }
  *,*::before,*::after { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; background: var(--bg);
    font: 16px/1.55 'Inter', system-ui, sans-serif; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px; -webkit-font-smoothing: antialiased;
  }
  .card { background:#fff; border:1px solid var(--border); border-radius:18px; padding:32px; max-width:440px; width:100%; box-shadow: var(--shadow); }
  .logo { display:inline-flex; align-items:center; gap:8px; font-family:'Fraunces', serif; font-weight:600; font-size:20px; color:var(--blue); margin-bottom:14px; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); }
  h1 { font-family:'Fraunces', serif; font-size:24px; font-weight:600; margin:0 0 6px; }
  .lede { color: var(--muted); margin:0 0 22px; font-size:14px; }
  label { font-weight: 600; font-size: 13px; display: block; margin: 14px 0 6px; }
  input {
    width:100%; padding:12px 14px; font: 15px/1.4 'Inter', sans-serif;
    border: 1.5px solid var(--border); border-radius: 10px; background: #fff;
    transition: border .12s; font-family: inherit;
  }
  input:focus { outline:0; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-l); }
  .help { font-size: 11px; color: var(--muted); margin: 4px 0 0; }
  .btn { width:100%; padding:13px; background:var(--blue); color:#fff; border:0; border-radius:10px; font:600 15px 'Inter',sans-serif; cursor:pointer; margin-top:22px; transition:background .12s; font-family: inherit; }
  .btn:hover { background: var(--blue-2); }
  .btn:disabled { opacity:.55; cursor:wait; }
  .err { margin-top:14px; padding:10px 14px; font-size:13px; background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; display:none; }
  .err.show { display: block; }
</style>
</head>
<body>
<form class="card" onsubmit="event.preventDefault(); doChange()">
  <div class="logo"><span class="logo-dot"></span> Poolside</div>
  <h1>Set a new password</h1>
  <p class="lede">First time signing in — pick a real password and we'll never use the default one again.</p>

  <label>Current (default) password</label>
  <input id="current" type="password" autocomplete="current-password" required>

  <label>New password <span class="help" style="display:inline">— at least 10 characters</span></label>
  <input id="next" type="password" autocomplete="new-password" minlength="10" required>

  <label>Confirm new password</label>
  <input id="confirm" type="password" autocomplete="new-password" minlength="10" required>

  <button class="btn" id="submit-btn" type="submit">Save new password →</button>
  <div class="err" id="err"></div>
</form>

<script type="module">
  const FN_URL = 'https://sdewylbddkcvidwosgxo.supabase.co/functions/v1/admin_auth';

  // Must already be signed in to reach this page.
  const token = localStorage.getItem('poolside_provider_token');
  if (!token) window.location.href = '/admin/login.html';

  async function doChange() {
    const btn   = document.getElementById('submit-btn');
    const errEl = document.getElementById('err');
    errEl.classList.remove('show');

    const current = document.getElementById('current').value;
    const next    = document.getElementById('next').value;
    const confirm = document.getElementById('confirm').value;
    if (next !== confirm) {
      errEl.textContent = 'New password fields don\'t match';
      errEl.classList.add('show'); return;
    }

    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await fetch(FN_URL, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ action: 'change_password', current_password: current, new_password: next }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'Password change failed');
      // Update cached user shape (clears is_default_pw)
      const user = JSON.parse(localStorage.getItem('poolside_provider_user') || '{}');
      user.is_default_pw = false;
      localStorage.setItem('poolside_provider_user', JSON.stringify(user));
      window.location.href = '/admin/';
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Save new password →';
    }
  }
  window.doChange = doChange;
</script>
</body>
</html>
