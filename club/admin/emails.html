<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Emails — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 16px/1.55 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--blue); }
  h1, h2, h3 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 26px; } h2 { font-size: 18px; margin-bottom: 12px; } h3 { font-size: 14px; }
  .logo { display: inline-flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; color: var(--blue); text-decoration: none; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header { padding: 14px 22px; border-bottom: 1px solid var(--border); background:#fff; display: flex; justify-content: space-between; align-items: center; }
  .who { font-size: 13px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .who a { cursor: pointer; }
  nav.tabs { background: #fff; border-bottom: 1px solid var(--border); padding: 0 22px; display: flex; gap: 4px; overflow-x: auto; }
  nav.tabs a { padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; text-decoration: none; margin-bottom: -1px; white-space: nowrap; }
  nav.tabs a.on { color: var(--blue); border-bottom-color: var(--blue); }
  nav.tabs a:hover { color: var(--blue); }
  main { flex: 1; padding: 28px 22px; max-width: 1280px; width: 100%; margin: 0 auto; }
  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 18px; }
  @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; } }
  .card { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow); }

  .list { padding: 0; overflow:hidden; }
  .group { padding: 6px 0; border-top: 1px solid var(--border); }
  .group:first-child { border-top: 0; }
  .group h3 { padding: 12px 18px 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-family: 'Inter'; font-size: 11px; font-weight: 700; }
  .item { display: block; padding: 12px 18px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.15s; }
  .item:hover { background: var(--bg-2); }
  .item.on { background: var(--blue-l); border-left-color: var(--blue); }
  .item .name { font-weight: 600; font-size: 14px; color: var(--text); }
  .item .desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .item .badge { display: inline-block; margin-left: 6px; padding: 1px 7px; border-radius: 999px; background: var(--green); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; vertical-align: middle; }
  .item .badge.disabled { background: var(--red); }

  .editor { padding: 22px 24px; }
  .editor h2 { font-family: 'Fraunces', serif; font-size: 22px; }
  .editor .desc { color: var(--muted); font-size: 13px; margin: 4px 0 18px; line-height: 1.55; }
  .editor label { display:block; font-weight:600; font-size:11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 14px 0 6px; }
  .editor input[type=text], .editor textarea {
    width: 100%; padding: 10px 12px; font: 14px/1.4 'Inter';
    border: 1.5px solid var(--border); border-radius: 10px; background: #fff;
    font-family: inherit;
  }
  .editor textarea { font-family: 'Menlo', 'Consolas', monospace; font-size: 13px; min-height: 280px; }
  /* Visual editor — contenteditable styled like the real email so admins
     edit something that looks like what members will receive. */
  .visual-toolbar { display: flex; gap: 4px; padding: 8px; border: 1.5px solid var(--border); border-bottom: 0; border-radius: 10px 10px 0 0; background: var(--bg-2); flex-wrap: wrap; }
  .visual-toolbar button { padding: 5px 10px; font: 600 13px 'Inter'; cursor: pointer; border: 1px solid transparent; border-radius: 6px; background: #fff; color: var(--text); min-width: 32px; }
  .visual-toolbar button:hover { background: var(--blue-l); border-color: var(--blue); color: var(--blue); }
  .visual-toolbar button.on { background: var(--blue); color: #fff; border-color: var(--blue); }
  .visual-toolbar .sep { width: 1px; background: var(--border); margin: 0 4px; }
  .visual-editor { min-height: 280px; padding: 16px 18px; border: 1.5px solid var(--border); border-radius: 0 0 10px 10px; background: #fff; outline: 0; font: 14px/1.55 'Inter', system-ui, sans-serif; color: var(--text); }
  .visual-editor:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-l); }
  .visual-editor h2 { font-family: 'Fraunces', Georgia, serif; font-size: 18px; color: var(--blue); margin: 0 0 8px; }
  .visual-editor h3 { font-family: 'Fraunces', Georgia, serif; font-size: 15px; color: var(--blue); margin: 14px 0 6px; }
  .visual-editor p { margin: 0 0 10px; }
  .visual-editor a { color: var(--blue); text-decoration: underline; }
  .visual-editor ul, .visual-editor ol { padding-left: 22px; margin: 8px 0; }
  /* Variable placeholders rendered as inline chips. user-select:all so a
     single click selects the entire chip; contenteditable=false on the
     span itself prevents typing inside the chip — user types around it. */
  .visual-editor .var-token, .visual-editor [data-var] {
    display: inline-block; padding: 1px 9px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #7c2d12; border: 1px solid #fcd34d; border-radius: 999px;
    font: 600 12px 'Inter', sans-serif; user-select: all; cursor: default;
    margin: 0 1px; vertical-align: baseline;
  }
  .visual-editor .var-token::before, .visual-editor [data-var]::before {
    content: '✦ '; opacity: .55; margin-right: 1px;
  }
  .mode-toggle { display: flex; gap: 4px; align-items: center; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
  .mode-toggle button { background: transparent; border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; cursor: pointer; font: 600 11px 'Inter'; color: var(--muted); }
  .mode-toggle button.on { background: var(--blue); color: #fff; border-color: var(--blue); }
  .editor input:focus, .editor textarea:focus { outline: 0; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-l); }

  .vars { padding: 12px 14px; background: var(--bg-2); border-radius: 10px; font-size: 12px; line-height: 1.7; margin-top: 10px; }
  .vars b { color: var(--blue); }
  .var-chip { display: inline-block; margin: 2px 4px 2px 0; padding: 2px 8px; background: #fff; border: 1px solid var(--border); border-radius: 6px; font-family: 'Menlo', monospace; font-size: 11px; color: var(--blue); cursor: pointer; }
  .var-chip:hover { background: var(--blue); color: #fff; }

  .preview-pane { padding: 18px 22px; border-top: 1px solid var(--border); margin-top: 18px; }
  .preview-pane h3 { font-family: 'Inter'; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
  .preview-subject { padding: 10px 14px; background: var(--bg-2); border-radius: 8px; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .preview-iframe { width: 100%; min-height: 480px; border: 1px solid var(--border); border-radius: 10px; background: #fff; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .checkbox-row input { width:auto; margin: 0; }
  .btn { padding: 9px 16px; border-radius: 10px; font: 600 13px 'Inter'; cursor: pointer; border: 1.5px solid transparent; background: var(--blue); color: #fff; }
  .btn:hover { background: var(--blue-2); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--blue); border-color: var(--border); }
  .btn-ghost:hover { background: var(--blue-l); }
  .btn-danger { background: transparent; color: var(--red); border-color: #fecaca; }
  .btn-danger:hover { background: #fee2e2; }

  .err { display:none; margin: 10px 0; padding:10px 14px; font-size:13px; background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; }
  .err.show { display:block; }
  .saved { color: var(--green); font-weight: 600; font-size: 13px; }
  .empty-state { padding: 80px 32px; text-align: center; color: var(--muted); }
  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-dot"></span> Poolside</a>
  <div class="who"><span id="whoami">…</span><a id="signout">Sign out</a></div>
</header>
<nav class="tabs">
  <a href="/club/admin/">Dashboard</a>
  <a href="/club/admin/members.html">Members</a>
  <a href="/club/admin/events.html">Calendar</a>
  <a href="/club/admin/announcements.html">Announcements</a>

  <a href="/club/admin/settings.html">Settings</a>
</nav>
<script src="/js/admin-flags.js"></script>

<main>
  <div class="toolbar">
    <h1>📧 Emails</h1>
    <p style="margin:0;color:var(--muted);font-size:13px">Customize the auto-emails Poolside sends. Each one falls back to a sensible default until you edit it.</p>
  </div>

  <div class="layout">
    <div class="card list" id="template-list">
      <div class="empty-state">Loading…</div>
    </div>
    <div class="card editor" id="editor">
      <div class="empty-state">
        Pick an email from the list to customize it.
      </div>
    </div>
  </div>
</main>

<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const ME_URL    = `${SUPABASE_URL}/functions/v1/tenant_admin_auth`;
const TPL_URL   = `${SUPABASE_URL}/functions/v1/email_templates`;

let TEMPLATES = [];
let CURRENT_KEY = null;
let CURRENT_TPL = null;

// Plain-English labels for every variable that exists in any template.
// Showing 'Member's name' in the chip is far friendlier than '{{primary_name}}'.
const VARIABLE_LABELS = {
  tenant_name:    'Club name',
  primary_name:   "Member's name",
  family_name:    'Family name',
  tier_label:     'Tier name',
  tier_price:     'Tier price',
  venmo_handle:   'Venmo handle',
  num_adults:     'Adults count',
  num_kids:       'Kids count',
  payment_method: 'Payment method',
  first_amount:   '1st installment $',
  second_amount:  '2nd installment $',
  final_due_date: 'Final due date',
  sign_in_link:   'Sign-in link',
  amount:         'Amount',
  sequence:       'Installment #',
  next_amount:    'Next installment $',
  next_due_date:  'Next due date',
  admin_notes:    "Admin's note",
  club_url:       'Club website URL',
};
function labelFor(varName) {
  return VARIABLE_LABELS[varName] || varName.replace(/_/g, ' ');
}

// Replace {{var_name}} with styled atomic chips for display. The data-var
// attribute holds the canonical name so we can untokenize back to {{var}}
// before storing.
function tokenize(html) {
  return String(html ?? '').replace(/\{\{\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*\}\}/g, (_m, name) => {
    return `<span class="var-token" data-var="${name}" contenteditable="false">${labelFor(name)}</span>`;
  });
}
// Inverse: walk DOM, replace each chip back to its {{var}} syntax.
function untokenize(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = String(html ?? '');
  tmp.querySelectorAll('span[data-var]').forEach(span => {
    const name = span.getAttribute('data-var');
    if (name) span.replaceWith(document.createTextNode(`{{${name}}}`));
  });
  return tmp.innerHTML;
}

function token() { return localStorage.getItem('poolside_tenant_token'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function logout() { ['poolside_tenant_token','poolside_tenant_user','poolside_tenant_tenant'].forEach(k => localStorage.removeItem(k)); window.location.href = '/club/admin/login.html'; }
document.getElementById('signout').addEventListener('click', logout);

async function api(action, extra = {}) {
  const t = token(); if (!t) { logout(); throw new Error('Not signed in'); }
  const res = await fetch(TPL_URL, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': `Bearer ${t}` },
    body: JSON.stringify({ action, ...extra }),
  });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res.json();
}

function groupOf(audience) {
  return ({ applicant: '📥 To applicants', member: '👋 To members', admin: '🛠️ To admins' })[audience] || 'Other';
}

function renderList() {
  const list = document.getElementById('template-list');
  if (!TEMPLATES.length) { list.innerHTML = '<div class="empty-state">No templates registered.</div>'; return; }
  // Group by audience for scannability
  const groups = {};
  for (const t of TEMPLATES) {
    const g = groupOf(t.audience);
    (groups[g] = groups[g] || []).push(t);
  }
  list.innerHTML = Object.entries(groups).map(([g, items]) => `
    <div class="group">
      <h3>${escapeHtml(g)}</h3>
      ${items.map(t => {
        const customized = !!t.override;
        const disabled = t.override && t.override.enabled === false;
        const badge = disabled
          ? '<span class="badge disabled">disabled</span>'
          : customized
            ? '<span class="badge">customized</span>'
            : '';
        return `
          <div class="item${t.key === CURRENT_KEY ? ' on' : ''}" data-key="${escapeHtml(t.key)}">
            <div class="name">${escapeHtml(t.label)}${badge}</div>
            <div class="desc">${escapeHtml(t.description)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `).join('');
  list.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => selectTemplate(el.dataset.key));
  });
}

function renderEditor() {
  const editor = document.getElementById('editor');
  if (!CURRENT_TPL) {
    editor.innerHTML = '<div class="empty-state">Pick an email from the list to customize it.</div>';
    return;
  }
  const t = CURRENT_TPL;
  const o = t.override;
  const subjectVal = o ? o.subject : t.default_subject;
  const bodyVal    = o ? o.body_html : t.default_body_html;
  const enabled    = o ? o.enabled : true;
  editor.innerHTML = `
    <h2>${escapeHtml(t.label)}</h2>
    <div class="desc">${escapeHtml(t.description)}</div>

    <label class="checkbox-row">
      <input type="checkbox" id="ed-enabled" ${enabled ? 'checked' : ''}>
      <span>Send this email when the trigger fires${enabled ? '' : ' (currently disabled)'}</span>
    </label>

    <label>Subject line</label>
    <input type="text" id="ed-subject" value="${escapeHtml(subjectVal)}">

    <label>Body</label>
    <div class="mode-toggle">
      <button id="mode-visual" class="on" onclick="setMode('visual')">📝 Visual</button>
      <button id="mode-html" onclick="setMode('html')">&lt;/&gt; HTML</button>
      <span style="margin-left:auto;font-size:11px">Pick visual unless you know HTML.</span>
    </div>

    <div id="visual-wrap">
      <div class="visual-toolbar">
        <button title="Big heading" onclick="exec('formatBlock','H2')">Heading</button>
        <button title="Smaller heading" onclick="exec('formatBlock','H3')">Subhead</button>
        <button title="Normal paragraph" onclick="exec('formatBlock','P')">Normal</button>
        <span class="sep"></span>
        <button title="Bold (Ctrl+B)" onclick="exec('bold')"><b>B</b></button>
        <button title="Italic (Ctrl+I)" onclick="exec('italic')"><i>I</i></button>
        <span class="sep"></span>
        <button title="Bulleted list" onclick="exec('insertUnorderedList')">• Bullets</button>
        <button title="Numbered list" onclick="exec('insertOrderedList')">1. Numbered</button>
        <span class="sep"></span>
        <button title="Add a link" onclick="addLink()">🔗 Link</button>
        <button title="Remove formatting from selected text" onclick="exec('removeFormat')">↺ Plain</button>
      </div>
      <div id="ed-body-visual" class="visual-editor" contenteditable="true">${tokenize(bodyVal)}</div>
      <div style="margin-top:6px;font-size:11px;color:var(--muted)">💡 The yellow chips like <span class="var-token" data-var="primary_name">${labelFor('primary_name')}</span> are placeholders — they auto-fill with the real name when the email sends. Type around them; click to delete.</div>
    </div>

    <textarea id="ed-body" style="display:none">${escapeHtml(bodyVal)}</textarea>

    <label>Click to insert a placeholder at your cursor</label>
    <div class="vars">
      ${t.variables.map(v => `<span class="var-chip" title="{{${escapeHtml(v)}}}" onclick="insertVar('${escapeHtml(v)}')">${escapeHtml(labelFor(v))}</span>`).join('')}
    </div>

    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;align-items:center">
      <button class="btn" id="ed-save" onclick="saveTemplate()">Save</button>
      <button class="btn btn-ghost" onclick="refreshPreview()">🔄 Refresh preview</button>
      ${o ? `<button class="btn btn-danger" onclick="resetTemplate()">Reset to default</button>` : ''}
      <span class="saved" id="ed-saved" style="display:none">✓ Saved</span>
    </div>

    <div class="err" id="ed-err"></div>

    <div class="preview-pane">
      <h3>Live preview</h3>
      <div class="preview-subject"><b style="color:var(--muted)">Subject:</b> <span id="prev-subject">…</span></div>
      <iframe class="preview-iframe" id="prev-iframe" sandbox=""></iframe>
    </div>
  `;
  // Auto-refresh preview when fields change. Visual editor fires 'input'
  // on every keystroke; textarea same. Sync visual → textarea on each
  // change so getBodyHtml() returns the latest content.
  document.getElementById('ed-subject').addEventListener('input', refreshPreview);
  document.getElementById('ed-body').addEventListener('input', refreshPreview);
  const visualEd = document.getElementById('ed-body-visual');
  if (visualEd) {
    visualEd.addEventListener('input', () => { syncVisualToTextarea(); refreshPreview(); });
  }
  // Reset mode to visual whenever a new template is opened
  currentMode = 'visual';
  refreshPreview();
}

// Pull HTML from whichever mode is active. Visual mode wins by default;
// HTML mode is only the source of truth while toggled to it.
function getBodyHtml() {
  const visualEditor = document.getElementById('ed-body-visual');
  const ta = document.getElementById('ed-body');
  if (currentMode === 'visual' && visualEditor) {
    syncVisualToTextarea();
    return ta.value;
  }
  return ta ? ta.value : '';
}
// Copy contenteditable HTML into the hidden textarea — converts the styled
// chips back to {{var}} text so what's saved is the canonical template.
function syncVisualToTextarea() {
  const visualEditor = document.getElementById('ed-body-visual');
  const ta = document.getElementById('ed-body');
  if (visualEditor && ta) ta.value = untokenize(visualEditor.innerHTML);
}

let currentMode = 'visual';
function setMode(mode) {
  currentMode = mode;
  const visualBtn = document.getElementById('mode-visual');
  const htmlBtn = document.getElementById('mode-html');
  const wrap = document.getElementById('visual-wrap');
  const ta = document.getElementById('ed-body');
  if (mode === 'html') {
    syncVisualToTextarea();   // textarea gets canonical {{var}} syntax
    wrap.style.display = 'none';
    ta.style.display = 'block';
    visualBtn.classList.remove('on');
    htmlBtn.classList.add('on');
  } else {
    // copy textarea back into visual editor — re-tokenize chips
    document.getElementById('ed-body-visual').innerHTML = tokenize(ta.value);
    wrap.style.display = 'block';
    ta.style.display = 'none';
    visualBtn.classList.add('on');
    htmlBtn.classList.remove('on');
  }
  refreshPreview();
}

// document.execCommand bridge for the visual toolbar. It's "deprecated"
// per spec but every browser still ships it and there's no smaller modern
// API for the basic commands we need.
function exec(cmd, arg) {
  const ed = document.getElementById('ed-body-visual');
  if (ed) ed.focus();
  document.execCommand(cmd, false, arg || null);
  syncVisualToTextarea();
  refreshPreview();
}

function addLink() {
  const url = prompt('Link URL (paste full URL including https://):', 'https://');
  if (!url) return;
  exec('createLink', url);
}

// Cursor-aware variable insertion. Visual mode drops a styled chip;
// HTML mode inserts the literal {{var}} text (for power users).
function insertVar(name) {
  if (currentMode === 'visual') {
    const ed = document.getElementById('ed-body-visual');
    if (!ed) return;
    ed.focus();
    const span = document.createElement('span');
    span.className = 'var-token';
    span.contentEditable = 'false';
    span.setAttribute('data-var', name);
    span.textContent = labelFor(name);
    const sel = window.getSelection();
    if (sel && sel.rangeCount && ed.contains(sel.anchorNode)) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(span);
      // Move the cursor to AFTER the inserted chip + add a space so the user
      // can immediately type without typing inside the chip.
      const after = document.createTextNode(' ');
      span.parentNode.insertBefore(after, span.nextSibling);
      const newRange = document.createRange();
      newRange.setStartAfter(after);
      newRange.collapse(true);
      sel.removeAllRanges();
      sel.addRange(newRange);
    } else {
      ed.appendChild(span);
    }
    syncVisualToTextarea();
  } else {
    const txt = `{{${name}}}`;
    const ta = document.getElementById('ed-body');
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0, start) + txt + ta.value.slice(end);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = start + txt.length;
  }
  refreshPreview();
}

let PREVIEW_DEBOUNCE = null;
async function refreshPreview() {
  if (PREVIEW_DEBOUNCE) clearTimeout(PREVIEW_DEBOUNCE);
  PREVIEW_DEBOUNCE = setTimeout(async () => {
    if (!CURRENT_KEY) return;
    const subject = document.getElementById('ed-subject').value;
    const body_html = getBodyHtml();
    try {
      const r = await api('preview', { key: CURRENT_KEY, subject, body_html });
      if (!r.ok) throw new Error(r.error);
      document.getElementById('prev-subject').textContent = r.subject;
      const iframe = document.getElementById('prev-iframe');
      iframe.srcdoc = r.html;
    } catch (e) {
      document.getElementById('prev-subject').textContent = '(preview failed: ' + e.message + ')';
    }
  }, 250);
}

async function saveTemplate() {
  const errEl = document.getElementById('ed-err');
  const savedEl = document.getElementById('ed-saved');
  errEl.classList.remove('show');
  savedEl.style.display = 'none';
  const btn = document.getElementById('ed-save');
  btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Saving…';
  try {
    const subject = document.getElementById('ed-subject').value.trim();
    const body_html = getBodyHtml().trim();
    const enabled = document.getElementById('ed-enabled').checked;
    const r = await api('save', { key: CURRENT_KEY, subject, body_html, enabled });
    if (!r.ok) throw new Error(r.error || 'save failed');
    savedEl.style.display = 'inline';
    setTimeout(() => { savedEl.style.display = 'none'; }, 2000);
    await loadTemplates();
    selectTemplate(CURRENT_KEY);
  } catch (e) {
    errEl.textContent = e.message; errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

async function resetTemplate() {
  if (!confirm('Reset this email to the default? Your customizations will be deleted.')) return;
  try {
    const r = await api('reset', { key: CURRENT_KEY });
    if (!r.ok) throw new Error(r.error || 'reset failed');
    await loadTemplates();
    selectTemplate(CURRENT_KEY);
  } catch (e) { alert(e.message); }
}

function selectTemplate(key) {
  CURRENT_KEY = key;
  CURRENT_TPL = TEMPLATES.find(t => t.key === key) || null;
  renderList();
  renderEditor();
}

async function loadTemplates() {
  try {
    const r = await api('list');
    if (!r.ok) throw new Error(r.error || 'load failed');
    TEMPLATES = r.templates || [];
    if (CURRENT_KEY) CURRENT_TPL = TEMPLATES.find(t => t.key === CURRENT_KEY) || null;
    renderList();
  } catch (e) {
    document.getElementById('template-list').innerHTML = `<div class="empty-state" style="color:var(--red)">${escapeHtml(e.message)}</div>`;
  }
}

(async () => {
  if (!token()) { logout(); return; }
  let me;
  try {
    const r = await fetch(ME_URL, { method: 'POST', headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token()}` }, body: JSON.stringify({ action: 'me' }) });
    me = await r.json();
    if (!me.ok) { logout(); return; }
  } catch { logout(); return; }
  document.title = `Emails — ${me.tenant.display_name}`;
  document.getElementById('whoami').textContent = me.user.display_name || me.user.email;
  if (window.PoolsideFlags) PoolsideFlags.apply((me.tenant && me.tenant.features) || {}, me.user, me.tenant, me.usage);
  await loadTemplates();
})();
</script>
