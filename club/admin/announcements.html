<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Announcements — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.55 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  a { color: var(--blue); }
  h1, h2, h3 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 26px; }
  h2 { font-size: 18px; margin-bottom: 12px; }
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px;
    color: var(--blue); text-decoration: none;
  }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header {
    padding: 14px 22px; border-bottom: 1px solid var(--border); background:#fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .who { font-size: 13px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .who a { cursor: pointer; }
  nav.tabs {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 22px; display: flex; gap: 4px; overflow-x: auto;
  }
  nav.tabs a {
    padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--muted);
    border-bottom: 3px solid transparent; text-decoration: none; margin-bottom: -1px;
    white-space: nowrap;
  }
  nav.tabs a.on { color: var(--blue); border-bottom-color: var(--blue); }
  nav.tabs a:hover { color: var(--blue); }
  main { flex: 1; padding: 28px 22px; max-width: 760px; width: 100%; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .btn {
    padding: 10px 18px; border-radius: var(--r-md);
    font: 600 13px 'Inter'; cursor: pointer; border: 1.5px solid transparent;
    background: var(--blue); color: #fff;
  }
  .btn:hover { background: var(--blue-2); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--blue); border-color: var(--border); }
  .btn-ghost:hover { background: var(--blue-l); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .post {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 20px 22px;
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .post.inactive { opacity: .55; background: var(--bg-2); }
  .post.pinned { border-left: 4px solid var(--sun); }
  .post-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    margin-bottom: 6px;
  }
  .post-title { font-family:'Fraunces', Georgia, serif; font-weight: 600; font-size: 18px; color: var(--blue); }
  .post-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .post-body { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .post-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .pin-pill { background:#fef3c7; color:#92400e; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .04em; text-transform: uppercase; margin-left: 8px; }
  .empty { padding: 60px 22px; text-align: center; color: var(--muted); border: 2px dashed var(--border); border-radius: var(--r-md); }

  /* Modal */
  .scrim {
    position: fixed; inset: 0; background: rgba(15, 23, 42, .55);
    display: none; align-items: flex-start; justify-content: center;
    overflow-y: auto; padding: 32px 16px; z-index: 50;
  }
  .scrim.open { display: flex; }
  .modal {
    background: #fff; border-radius: var(--r-lg); padding: 26px;
    width: 100%; max-width: 580px; box-shadow: 0 20px 60px rgba(10,59,92,.18);
  }
  .modal label { display: block; font-weight: 600; font-size: 12px; margin: 12px 0 4px; }
  .modal input, .modal textarea {
    width: 100%; padding: 10px 12px; font: 14px/1.4 'Inter';
    border: 1.5px solid var(--border); border-radius: 10px; background: #fff;
    font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus {
    outline: 0; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-l);
  }
  .modal textarea { resize: vertical; min-height: 120px; }
  .check-row { display: flex; align-items: center; gap: 8px; margin: 14px 0 4px; font-size: 14px; }
  .check-row input { width: auto; }
  .modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
  .modal-foot .left { margin-right: auto; }
  .err { display:none; margin-top:12px; padding:10px 14px; font-size:13px;
         background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; }
  .err.show { display: block; }

  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-dot"></span> Poolside</a>
  <div class="who"><span id="whoami">…</span><a id="signout">Sign out</a></div>
</header>
<nav class="tabs">
  <a href="/club/admin/">Dashboard</a>
  <a href="/club/admin/households.html">Households</a>
  <a href="/club/admin/applications.html">Applications</a>
  <a href="/club/admin/payments.html">Payments</a>
  <a href="/club/admin/events.html">Calendar</a>
  <a href="/club/admin/programs.html">Programs</a>
  <a href="/club/admin/parties.html">Parties</a>
  <a href="/club/admin/announcements.html" class="on">Announcements</a>
  <a href="/club/admin/campaigns.html">Campaigns</a>
  <a href="/club/admin/volunteer.html">Volunteer</a>
  <a href="/club/admin/guest-passes.html">Passes</a>
  <a href="/club/admin/policies.html">Policies</a>
  <a href="/club/admin/photos.html">Photos</a>
  <a href="/club/admin/documents.html">Documents</a>
  <a href="/club/admin/impact.html">Impact</a>
  <a href="/club/admin/settings.html">Settings</a>
  <a href="/club/wizard.html">Wizard</a>
</nav>
<script src="/js/admin-flags.js"></script>

<main>
  <div class="toolbar">
    <h1>Announcements</h1>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input id="search" type="search" placeholder="🔍 Search posts…" oninput="applySearch()" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-md);width:220px;font:14px/1.4 'Inter'">
      <button class="btn" onclick="openCreate()">+ New post</button>
    </div>
  </div>

  <div id="list">
    <div class="empty">Loading…</div>
  </div>
</main>

<!-- Create / edit modal -->
<div class="scrim" id="scrim">
  <div class="modal">
    <h2 id="m-title">New post</h2>
    <input type="hidden" id="m-id">
    <label>Title</label>
    <input id="m-title-input" maxlength="140" placeholder="Pool re-opens Saturday">
    <label>Body</label>
    <textarea id="m-body" maxlength="4000" rows="6" placeholder="What's happening, when, anything members should know."></textarea>
    <div class="check-row">
      <input type="checkbox" id="m-pinned">
      <label for="m-pinned" style="margin:0;font-weight:500">📌 Pin to top of the home page</label>
    </div>
    <div class="err" id="m-err"></div>
    <div class="modal-foot">
      <button id="m-delete" class="btn btn-danger left" style="display:none" onclick="del()">Remove post</button>
      <button class="btn btn-ghost" onclick="closeM()">Cancel</button>
      <button class="btn" id="m-save" onclick="save()">Save</button>
    </div>
  </div>
</div>

<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const POSTS_URL = `${SUPABASE_URL}/functions/v1/posts_admin`;
const ME_URL    = `${SUPABASE_URL}/functions/v1/tenant_admin_auth`;

function token() { return localStorage.getItem('poolside_tenant_token'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function logout() {
  localStorage.removeItem('poolside_tenant_token');
  localStorage.removeItem('poolside_tenant_user');
  localStorage.removeItem('poolside_tenant_tenant');
  window.location.href = '/club/admin/login.html';
}
document.getElementById('signout').addEventListener('click', logout);

async function call(action, extra = {}) {
  const t = token();
  if (!t) { logout(); throw new Error('Not signed in'); }
  const res = await fetch(POSTS_URL, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': `Bearer ${t}` },
    body: JSON.stringify({ action, ...extra }),
  });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res.json();
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

function render(posts) {
  const list = document.getElementById('list');
  if (!posts.length) {
    list.innerHTML = `<div class="empty"><h2>No announcements yet</h2>Post something for your members above.</div>`;
    return;
  }
  list.innerHTML = posts.map(p => `
    <div class="post ${p.pinned ? 'pinned' : ''} ${p.active ? '' : 'inactive'}">
      <div class="post-head">
        <div class="post-title">${escapeHtml(p.title)}${p.pinned ? '<span class="pin-pill">Pinned</span>' : ''}${p.active ? '' : '<span class="pin-pill" style="background:#fee2e2;color:#7f1d1d">Removed</span>'}</div>
      </div>
      <div class="post-meta">${fmtDate(p.published_at)}${p.updated_at && p.updated_at !== p.created_at ? ' · edited ' + fmtDate(p.updated_at) : ''}</div>
      <div class="post-body">${escapeHtml(p.body)}</div>
      <div class="post-actions">
        <button class="btn btn-ghost btn-sm" onclick='openEdit(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Edit</button>
        ${p.active ? `<button class="btn btn-ghost btn-sm" onclick="quickPin('${p.id}', ${!p.pinned})">${p.pinned ? 'Unpin' : 'Pin'}</button>` : ''}
      </div>
    </div>
  `).join('');
}

let CACHE = [];
async function refresh() {
  try {
    const data = await call('list');
    if (!data.ok) throw new Error(data.error || 'Failed to load');
    CACHE = data.posts || [];
    applySearch();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="empty" style="border-color:#fecaca;color:#7f1d1d">${escapeHtml(e.message)}</div>`;
  }
}

function applySearch() {
  const q = (document.getElementById('search')?.value || '').trim().toLowerCase();
  if (!q) { render(CACHE); return; }
  const filtered = CACHE.filter(p =>
    (p.title || '').toLowerCase().includes(q) ||
    (p.body  || '').toLowerCase().includes(q));
  render(filtered);
}

function openCreate() {
  document.getElementById('m-title').textContent = 'New post';
  document.getElementById('m-id').value = '';
  document.getElementById('m-title-input').value = '';
  document.getElementById('m-body').value = '';
  document.getElementById('m-pinned').checked = false;
  document.getElementById('m-delete').style.display = 'none';
  document.getElementById('m-err').classList.remove('show');
  document.getElementById('scrim').classList.add('open');
}
function openEdit(p) {
  document.getElementById('m-title').textContent = 'Edit post';
  document.getElementById('m-id').value = p.id;
  document.getElementById('m-title-input').value = p.title;
  document.getElementById('m-body').value = p.body;
  document.getElementById('m-pinned').checked = !!p.pinned;
  document.getElementById('m-delete').style.display = p.active ? 'inline-block' : 'none';
  document.getElementById('m-err').classList.remove('show');
  document.getElementById('scrim').classList.add('open');
}
function closeM() { document.getElementById('scrim').classList.remove('open'); }

async function save() {
  const id     = document.getElementById('m-id').value;
  const title  = document.getElementById('m-title-input').value.trim();
  const body   = document.getElementById('m-body').value.trim();
  const pinned = document.getElementById('m-pinned').checked;
  const err = document.getElementById('m-err');
  err.classList.remove('show');
  const btn = document.getElementById('m-save');
  btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Saving…';
  try {
    const action = id ? 'update' : 'create';
    const data = await call(action, id ? { id, title, body, pinned } : { title, body, pinned });
    if (!data.ok) throw new Error(data.error || 'Save failed');
    closeM();
    await refresh();
  } catch (e) { err.textContent = e.message; err.classList.add('show'); }
  finally { btn.disabled = false; btn.textContent = orig; }
}

async function del() {
  const id = document.getElementById('m-id').value;
  if (!id) return;
  if (!confirm('Remove this post? Members will no longer see it on the home page.')) return;
  try {
    const data = await call('delete', { id });
    if (!data.ok) throw new Error(data.error || 'Delete failed');
    closeM();
    await refresh();
  } catch (e) {
    const err = document.getElementById('m-err');
    err.textContent = e.message; err.classList.add('show');
  }
}

async function quickPin(id, pinned) {
  try {
    const data = await call('update', { id, pinned });
    if (!data.ok) throw new Error(data.error || 'Could not pin');
    await refresh();
  } catch (e) { alert(e.message); }
}

(async () => {
  if (!token()) { logout(); return; }
  try {
    const me = await fetch(ME_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token()}` },
      body: JSON.stringify({ action: 'me' }),
    }).then(r => r.json());
    if (!me.ok) { logout(); return; }
    document.title = `Announcements — ${me.tenant.display_name}`;
    document.getElementById('whoami').textContent = me.user.display_name || me.user.email;
    if (window.PoolsideFlags) PoolsideFlags.apply((me.tenant && me.tenant.features) || {}, me.user, me.tenant);
  } catch { logout(); return; }
  await refresh();
})();
</script>
</body>
</html>
