<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Admin — Poolside</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.55 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  a { color: var(--blue); }
  h1, h2, h3 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 32px; line-height: 1.1; }
  h2 { font-size: 18px; margin-bottom: 12px; }
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px;
    color: var(--blue); text-decoration: none;
  }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header {
    padding: 14px 22px; border-bottom: 1px solid var(--border); background:#fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .who { font-size: 13px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .who a { color: var(--blue); cursor: pointer; }
  main {
    flex: 1; padding: 32px 22px;
    max-width: 880px; width: 100%; margin: 0 auto;
  }
  .card {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 28px;
    box-shadow: var(--shadow); margin-bottom: 22px;
  }
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase;
  }
  .pill.trial    { background: #fef3c7; color: #92400e; }
  .pill.active   { background: #dcfce7; color: #14532d; }
  .pill.suspended{ background: #fee2e2; color: #7f1d1d; }
  .lede { color: var(--muted); margin: 8px 0 0; font-size: 15px; }
  .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 18px; }
  .stat {
    background: var(--bg-2); border-radius: var(--r-md); padding: 18px 16px;
  }
  .stat .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
  .stat .val { font-size: 22px; font-weight: 700; margin-top: 6px; color: var(--blue); }
  .placeholder {
    border: 2px dashed var(--border); border-radius: var(--r-md);
    padding: 40px 22px; text-align: center; color: var(--muted);
  }
  nav.tabs {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 22px; display: flex; gap: 4px;
  }
  nav.tabs a {
    padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--muted);
    border-bottom: 3px solid transparent; text-decoration: none; margin-bottom: -1px;
  }
  nav.tabs a.on { color: var(--blue); border-bottom-color: var(--blue); }
  nav.tabs a:hover { color: var(--blue); }
  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-dot"></span> Poolside</a>
  <div class="who">
    <span id="whoami">…</span>
    <a id="signout">Sign out</a>
  </div>
</header>
<nav class="tabs">
  <a href="/club/admin/" class="on">Dashboard</a>
  <a href="/club/admin/members.html">Members</a>
  <a href="/club/admin/events.html">Calendar</a>
  <a href="/club/admin/announcements.html">Announcements</a>
  <a href="/club/admin/campaigns.html">Campaigns</a>
  <a href="/club/admin/policies.html">Policies</a>
  <a href="/club/admin/photos.html">Photos</a>
  <a href="/club/admin/impact.html">Impact</a>
  <a href="/club/admin/settings.html">Settings</a>
  <a href="/club/wizard.html">Wizard</a>
</nav>
<script src="/js/admin-flags.js"></script>
<main id="main">
  <div class="card"><p>Loading…</p></div>
</main>
<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const AUTH_URL    = `${SUPABASE_URL}/functions/v1/tenant_admin_auth`;
const APPS_URL    = `${SUPABASE_URL}/functions/v1/applications`;
const PARTIES_URL = `${SUPABASE_URL}/functions/v1/parties_admin`;
const SETTINGS_URL = `${SUPABASE_URL}/functions/v1/tenant_settings`;
const HH_URL = `${SUPABASE_URL}/functions/v1/households_admin`;
const PAY_URL = `${SUPABASE_URL}/functions/v1/payments_admin`;
const EVENTS_URL = `${SUPABASE_URL}/functions/v1/events_admin`;
const PROGRAMS_URL = `${SUPABASE_URL}/functions/v1/programs`;
const VOLUNTEER_URL = `${SUPABASE_URL}/functions/v1/volunteer`;
const CAMPAIGNS_URL = `${SUPABASE_URL}/functions/v1/campaigns`;
const TASKS_URL = `${SUPABASE_URL}/functions/v1/admin_tasks`;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function logout() {
  localStorage.removeItem('poolside_tenant_token');
  localStorage.removeItem('poolside_tenant_user');
  localStorage.removeItem('poolside_tenant_tenant');
  window.location.href = '/club/admin/login.html';
}

document.getElementById('signout').addEventListener('click', logout);

// Provider impersonation handoff: if the URL hash has a bootstrap=<jwt>
// payload (provider opens us in a new tab via tenants_admin/impersonate),
// move the token into localStorage and reload to a clean URL.
(function bootstrapFromHash() {
  if (!window.location.hash.startsWith('#bootstrap=')) return;
  const tok = decodeURIComponent(window.location.hash.slice('#bootstrap='.length));
  if (!tok) return;
  localStorage.setItem('poolside_tenant_token', tok);
  // Wipe stale user/tenant cache from any previous session — `me` will
  // repopulate them below.
  localStorage.removeItem('poolside_tenant_user');
  localStorage.removeItem('poolside_tenant_tenant');
  // Strip the hash so the token doesn't linger in browser history.
  history.replaceState(null, '', window.location.pathname + window.location.search);
})();

(async () => {
  const token = localStorage.getItem('poolside_tenant_token');
  if (!token) { logout(); return; }

  let res, data;
  try {
    res = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token}` },
      body: JSON.stringify({ action: 'me' }),
    });
    data = await res.json();
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="card"><h2>Network error</h2><p>${escapeHtml(e.message)}</p></div>`;
    return;
  }
  if (!data.ok) { logout(); return; }

  const { user, tenant } = data;
  document.title = `Admin — ${tenant.display_name}`;
  document.getElementById('whoami').textContent = `${user.display_name || user.email}`;
    if (window.PoolsideFlags) PoolsideFlags.apply((data.tenant && data.tenant.features) || {}, data.user, data.tenant, data.usage);

  if (user.impersonated) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#fef3c7;color:#78350f;padding:8px 22px;font-size:13px;text-align:center;border-bottom:1px solid #fde68a';
    banner.innerHTML = `🔑 You're signed in as <b>${escapeHtml(tenant.display_name)}</b> via provider impersonation. Token expires in ≤1 hour.`;
    document.body.insertBefore(banner, document.body.firstChild);
  }

  // First-run: kick the user into the setup wizard if they haven't finished it.
  try {
    const sRes = await fetch(SETTINGS_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token}` },
      body: JSON.stringify({ action: 'get' }),
    });
    const sData = await sRes.json();
    if (sData.ok && !sData.settings?.setup_wizard_complete) {
      window.location.href = '/club/wizard.html';
      return;
    }
  } catch { /* dashboard is the safe fallback */ }

  const statusLabel = ({trial:'Free Trial', active:'Active', suspended:'Suspended', churned:'Closed'})[tenant.status] ?? tenant.status;
  const planLabel   = ({free:'Free', starter:'Starter', pro:'Pro', enterprise:'Enterprise'})[tenant.plan] ?? tenant.plan;

  // Households + member counts in parallel with the render
  let hhCount = '…', memberCount = '…';
  document.getElementById('main').innerHTML = `
    <div class="card">
      <h1>${escapeHtml(tenant.display_name)}</h1>
      <p class="lede">Admin dashboard — <code>${escapeHtml(tenant.slug)}.poolsideapp.com</code></p>
      <div class="grid">
        <div class="stat"><div class="lbl">Status</div><div class="val"><span class="pill ${escapeHtml(tenant.status)}">${escapeHtml(statusLabel)}</span></div></div>
        <div class="stat"><div class="lbl">Plan</div><div class="val">${escapeHtml(planLabel)}</div></div>
        <div class="stat"><div class="lbl">Households</div><div class="val" id="hh-count">…</div></div>
        <div class="stat"><div class="lbl">Members</div><div class="val" id="m-count">…</div></div>
        <div class="stat"><div class="lbl">Open payments</div><div class="val" id="pay-count">…</div></div>
        <div class="stat"><div class="lbl">Upcoming events</div><div class="val" id="ev-count">…</div></div>
        <div class="stat"><div class="lbl">Active programs</div><div class="val" id="prog-count">…</div></div>
        <div class="stat"><div class="lbl">Live campaigns</div><div class="val" id="camp-count">…</div></div>
      </div>
    </div>

    <div class="card" id="activity-card">
      <h2>What needs your attention</h2>
      <div class="placeholder">Loading…</div>
    </div>

    <div class="card" id="tasks-card" style="display:none">
      <h2>Your tasks</h2>
      <p style="font-size:12px;color:var(--muted);margin:0 0 14px">Things routed to your role. First admin to handle one closes it for everyone.</p>
      <div id="tasks-list"></div>
    </div>

    <div class="card">
      <h2>Quick actions</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px">
        <a class="qa" href="/club/admin/members.html#applications" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">📨 <b>Review applications</b><br><span style="color:var(--muted);font-size:12px">Approve new memberships</span></a>
        <a class="qa" href="/club/admin/announcements.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">📣 <b>Post announcement</b><br><span style="color:var(--muted);font-size:12px">News for members</span></a>
        <a class="qa" href="/club/admin/events.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">📅 <b>Add event</b><br><span style="color:var(--muted);font-size:12px">Calendar entry</span></a>
        <a class="qa" href="/club/admin/programs.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">🏊 <b>Add program</b><br><span style="color:var(--muted);font-size:12px">Swim lessons / yoga / camp</span></a>
        <a class="qa" href="/club/admin/guest-passes.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">🎟️ <b>Issue guest passes</b><br><span style="color:var(--muted);font-size:12px">Pre-paid bundles</span></a>
        <a class="qa" href="/club/admin/photos.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">📷 <b>Upload photos</b><br><span style="color:var(--muted);font-size:12px">Gallery for members</span></a>
        <a class="qa" href="/club/admin/volunteer.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">🙋 <b>Post volunteer slot</b><br><span style="color:var(--muted);font-size:12px">Snack-bar shift, swim meet</span></a>
        <a class="qa" href="/club/admin/settings.html" style="display:block;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:#fff">⚙️ <b>Club settings</b><br><span style="color:var(--muted);font-size:12px">Branding, hours, contact</span></a>
      </div>
    </div>
  `;

  // Households + members counts
  try {
    const hRes = await fetch(HH_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token}` },
      body: JSON.stringify({ action: 'list' }),
    });
    const hData = await hRes.json();
    if (hData.ok) {
      const active = (hData.households || []).filter(h => h.active !== false);
      const memberTotal = active.reduce((n, h) => n + (h.members || []).filter(m => m.active).length, 0);
      document.getElementById('hh-count').textContent = active.length;
      document.getElementById('m-count').textContent = memberTotal;
    } else {
      document.getElementById('hh-count').textContent = '0';
      document.getElementById('m-count').textContent = '0';
    }
  } catch {
    document.getElementById('hh-count').textContent = '–';
    document.getElementById('m-count').textContent = '–';
  }

  // Activity feed + secondary stats. All in parallel — none depends on the others.
  try {
    const headers = { 'content-type': 'application/json', 'authorization': `Bearer ${token}` };
    const j = (url, body) => fetch(url, { method: 'POST', headers, body: JSON.stringify(body) }).then(r => r.json()).catch(() => ({ ok: false }));
    const [appsPending, parties, payments, events, programs, campaigns] = await Promise.all([
      j(APPS_URL,      { action: 'list', status: 'pending' }),
      j(PARTIES_URL,   { action: 'list', status: 'pending' }),
      j(PAY_URL,       { action: 'list' }),
      j(EVENTS_URL,    { action: 'list', range: 'upcoming' }),
      j(PROGRAMS_URL,  { action: 'list', active_only: true }),
      j(CAMPAIGNS_URL, { action: 'list' }),
    ]);

    const appCount   = (appsPending.applications || []).length;
    const partyCount = (parties.bookings || []).length;
    const payItems   = payments.items || [];
    const overdueCount = payItems.filter(i => (i.age_days ?? 0) >= 14).length;
    const upcomingEv = (events.events || []).filter(e => new Date(e.starts_at).getTime() >= Date.now()).slice(0, 30).length;
    const activeProg = (programs.programs || []).length;
    const liveCamp = (campaigns.campaigns || []).filter(c => {
      if (!c.active) return false;
      const now = Date.now();
      if (new Date(c.starts_at).getTime() > now) return false;
      if (c.ends_at && new Date(c.ends_at).getTime() < now) return false;
      return true;
    }).length;

    document.getElementById('pay-count').textContent  = payItems.length;
    document.getElementById('ev-count').textContent   = upcomingEv;
    document.getElementById('prog-count').textContent = activeProg;
    document.getElementById('camp-count').textContent = liveCamp;

    const items = [];
    if (appCount > 0) items.push({
      icon: '📨', label: `${appCount} new application${appCount === 1 ? '' : 's'}`,
      sub: 'Review pending memberships', href: '/club/admin/members.html#applications', tone: 'amber',
    });
    if (partyCount > 0) items.push({
      icon: '🎉', label: `${partyCount} party request${partyCount === 1 ? '' : 's'}`,
      sub: 'Approve or reject', href: '/club/admin/parties.html', tone: 'amber',
    });
    if (payItems.length > 0) items.push({
      icon: '💸', label: `${payItems.length} open payment${payItems.length === 1 ? '' : 's'}`,
      sub: overdueCount > 0 ? `${overdueCount} 14+ days old` : 'Dues, programs, passes',
      href: '/club/admin/payments.html', tone: overdueCount > 0 ? 'red' : 'amber',
    });

    const card = document.getElementById('activity-card');
    if (items.length === 0) {
      card.innerHTML = `<h2>What needs your attention</h2><div class="placeholder">✓ All caught up — no pending applications, party requests, or unpaid items.</div>`;
    } else {
      card.innerHTML = `<h2>What needs your attention</h2>
        <div style="display:flex;flex-direction:column;gap:8px">${items.map(it => `
          <a href="${it.href}" style="display:flex;gap:14px;align-items:center;padding:14px 18px;border:1px solid var(--border);border-radius:var(--r-md);text-decoration:none;color:var(--text);background:${it.tone==='red'?'#fef2f2':it.tone==='amber'?'#fffbeb':'#fff'};border-left:4px solid ${it.tone==='red'?'var(--red)':it.tone==='amber'?'var(--sun)':'var(--blue)'}">
            <div style="font-size:24px">${it.icon}</div>
            <div style="flex:1"><div style="font-weight:600;font-size:14px">${escapeHtml(it.label)}</div><div style="font-size:12px;color:var(--muted)">${escapeHtml(it.sub)}</div></div>
            <div style="color:var(--blue);font-weight:600">→</div>
          </a>
        `).join('')}</div>`;
    }
  } catch {
    document.getElementById('activity-card').innerHTML = `<h2>What needs your attention</h2><div class="placeholder">Couldn't load activity feed.</div>`;
    ['pay-count','ev-count','prog-count','camp-count'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = '–'; });
  }

  // Per-role task queue (admin_tasks)
  try {
    const r = await fetch(TASKS_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token}` },
      body: JSON.stringify({ action: 'list' }),
    });
    const tdata = await r.json();
    if (!tdata.ok) throw new Error(tdata.error || 'Failed');
    const tasks = tdata.tasks || [];
    if (!tasks.length) return;
    const card = document.getElementById('tasks-card');
    const list = document.getElementById('tasks-list');
    card.style.display = 'block';
    const KIND_ICON = {
      'application.submitted': '📨',
      'venmo.claim':           '💸',
      'party.requested':       '🎉',
    };
    list.innerHTML = tasks.map(t => {
      const ageHours = Math.max(0, Math.floor((Date.now() - new Date(t.created_at).getTime()) / 3600_000));
      const age = ageHours < 1 ? 'just now' : ageHours < 24 ? `${ageHours}h ago` : `${Math.floor(ageHours / 24)}d ago`;
      return `
        <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:#fff">
          <div style="font-size:20px;flex-shrink:0">${KIND_ICON[t.kind] || '🔔'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px">${escapeHtml(t.summary)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${escapeHtml(age)} · ${escapeHtml((t.target_scopes || []).join(', ') || 'owners')}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            ${t.link_url ? `<a href="${escapeHtml(t.link_url)}" style="padding:6px 12px;background:var(--blue);color:#fff;text-decoration:none;border-radius:8px;font:600 12px 'Inter'">Open</a>` : ''}
            <button onclick="completeTask('${t.id}')" style="padding:6px 12px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;font:600 12px 'Inter';cursor:pointer">✓ Done</button>
          </div>
        </div>`;
    }).join('');
  } catch { /* non-critical */ }
})();

async function completeTask(id) {
  const t = localStorage.getItem('poolside_tenant_token');
  await fetch(`${SUPABASE_URL}/functions/v1/admin_tasks`, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': `Bearer ${t}` },
    body: JSON.stringify({ action: 'complete', id }),
  });
  window.location.reload();
}
</script>
</body>
</html>
