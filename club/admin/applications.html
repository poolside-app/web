<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Applications — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 16px/1.55 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--blue); }
  h1, h2, h3 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 26px; }
  h2 { font-size: 18px; margin-bottom: 12px; }
  h3 { font-size: 15px; margin: 0 0 8px; }
  .logo { display: inline-flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; color: var(--blue); text-decoration: none; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header { padding: 14px 22px; border-bottom: 1px solid var(--border); background:#fff; display: flex; justify-content: space-between; align-items: center; }
  .who { font-size: 13px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .who a { cursor: pointer; }
  nav.tabs { background: #fff; border-bottom: 1px solid var(--border); padding: 0 22px; display: flex; gap: 4px; overflow-x: auto; }
  nav.tabs a { padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; text-decoration: none; margin-bottom: -1px; white-space: nowrap; }
  nav.tabs a.on { color: var(--blue); border-bottom-color: var(--blue); }
  nav.tabs a:hover { color: var(--blue); }
  main { flex: 1; padding: 28px 22px; max-width: 880px; width: 100%; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-row button { padding: 8px 14px; border: 1.5px solid var(--border); background: #fff; border-radius: 999px; font: 600 12px 'Inter'; cursor: pointer; color: var(--muted); }
  .filter-row button.on { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn { padding: 10px 18px; border-radius: var(--r-md); font: 600 13px 'Inter'; cursor: pointer; border: 1.5px solid transparent; background: var(--blue); color: #fff; }
  .btn:hover { background: var(--blue-2); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--blue); border-color: var(--border); }
  .btn-success { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .app { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 22px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
  .app:hover { border-color: var(--blue); }
  .app h3 { font-size: 16px; }
  .app .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .app .body { font-size: 13px; margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
  .app .note { color: var(--blue); font-style: italic; font-size: 12px; margin-top: 6px; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .pill.pending  { background: #fef3c7; color: #92400e; }
  .pill.approved { background: #dcfce7; color: #14532d; }
  .pill.rejected { background: #fee2e2; color: #7f1d1d; }
  .pill.unpaid   { background: #fee2e2; color: #7f1d1d; }
  .pill.paid     { background: #dcfce7; color: #14532d; }
  .pill.stripe   { background: #ddd6fe; color: #5b21b6; }
  .pill.venmo    { background: #cffafe; color: #155e75; }
  .pill.overdue  { background: #fee2e2; color: #7f1d1d; }
  .pill.ok       { background: #dcfce7; color: #14532d; }
  .pill.miss     { background: #fee2e2; color: #7f1d1d; }
  .empty { padding: 60px 22px; text-align: center; color: var(--muted); border: 2px dashed var(--border); border-radius: var(--r-md); }
  .roster { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.55; }
  .roster .row { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
  .roster .row:last-child { border-bottom: 0; }
  .roster .row .who { font-weight: 600; color: var(--text); }
  .roster .row .extra { color: var(--muted); font-size: 11px; }
  .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
  .sig-grid .box { border: 1px solid var(--border); border-radius: 10px; padding: 8px; background: #fff; text-align: center; }
  .sig-grid .box img { max-width: 100%; max-height: 90px; display: block; margin: 0 auto; }
  .sig-grid .box .lbl { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 4px; }
  .waivers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .scrim { position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 32px 16px; z-index: 50; }
  .scrim.open { display: flex; }
  .modal { background: #fff; border-radius: var(--r-lg); padding: 26px; width: 100%; max-width: 640px; box-shadow: 0 20px 60px rgba(10,59,92,.18); }
  .info { background: var(--bg-2); border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 1.55; }
  .info b { color: var(--blue); }
  .modal label { display: block; font-weight: 600; font-size: 12px; margin: 12px 0 4px; }
  .modal input { width: 100%; padding: 10px 12px; font: 14px 'Inter'; border: 1.5px solid var(--border); border-radius: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .err { display:none; margin-top:12px; padding:10px 14px; font-size:13px; background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; }
  .err.show { display: block; }
  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-dot"></span> Poolside</a>
  <div class="who"><span id="whoami">…</span><a id="signout">Sign out</a></div>
</header>
<nav class="tabs">
  <a href="/club/admin/">Dashboard</a>
  <a href="/club/admin/households.html">Households</a>
  <a href="/club/admin/applications.html" class="on">Applications</a>
  <a href="/club/admin/events.html">Calendar</a>
  <a href="/club/admin/parties.html">Parties</a>
  <a href="/club/admin/announcements.html">Announcements</a>
  <a href="/club/admin/photos.html">Photos</a>
  <a href="/club/admin/documents.html">Documents</a>
  <a href="/club/admin/impact.html">Impact</a>
  <a href="/club/admin/settings.html">Settings</a>
</nav>
<script src="/js/admin-flags.js"></script>

<main>
  <div class="toolbar">
    <h1>Applications</h1>
    <input id="search" type="search" placeholder="🔍 Search applications…" oninput="applySearch()" style="padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-md);width:220px;font:14px/1.4 'Inter'">
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
      <div class="filter-row" id="status-filter">
        <button class="on" data-status="pending">Pending</button>
        <button data-status="approved">Approved</button>
        <button data-status="rejected">Rejected</button>
        <button data-status="all">All</button>
      </div>
      <div class="filter-row" id="payment-filter" style="border-left:1px solid var(--border);padding-left:14px">
        <button class="on" data-filter="">Any payment</button>
        <button data-filter="unpaid">Unpaid</button>
        <button data-filter="overdue">Overdue 10d+</button>
      </div>
    </div>
  </div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>

<div class="scrim" id="scrim">
  <div class="modal">
    <h2 id="m-title">Application</h2>
    <div class="info" id="m-info">…</div>
    <div id="m-body" style="font-size:13px;line-height:1.5;color:var(--muted);min-height:20px;white-space:pre-wrap;margin-top:14px"></div>

    <hr style="margin:18px 0;border:0;border-top:1px solid var(--border)">

    <h3>Approve as</h3>
    <p style="color:var(--muted);font-size:12px;margin:0 0 8px">Optional household-level overrides.</p>
    <div class="row3">
      <div><label>Tier</label>
        <select id="ov-tier" style="width:100%;padding:10px 12px;font:14px 'Inter';border:1.5px solid var(--border);border-radius:10px">
          <option value="family">Family</option>
          <option value="single">Single</option>
          <option value="senior">Senior</option>
          <option value="staff">Staff</option>
        </select>
      </div>
      <div><label>Fob #</label><input id="ov-fob_number"></div>
      <div><label>Paid until year</label><input id="ov-paid_until_year" type="number"></div>
    </div>
    <label>Admin note <span style="color:var(--muted);font-weight:500;font-size:11px">(visible on the application record)</span></label>
    <input id="m-admin_notes">

    <div class="err" id="m-err"></div>
    <div class="modal-foot" style="flex-wrap:wrap">
      <button class="btn btn-ghost" id="m-remind" style="display:none" onclick="reminderClick()">📧 Send reminder</button>
      <button class="btn btn-ghost" onclick="closeM()">Close</button>
      <button class="btn btn-danger" id="m-reject" onclick="rej()">Reject</button>
      <button class="btn btn-success" id="m-approve" onclick="appr()">Approve & create household →</button>
      <button class="btn btn-success" id="m-verify" style="display:none" onclick="verifyClick()">✓ Verify Venmo payment</button>
    </div>
  </div>
</div>

<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const APPS_URL = `${SUPABASE_URL}/functions/v1/applications`;
const ME_URL   = `${SUPABASE_URL}/functions/v1/tenant_admin_auth`;

let STATUS = 'pending';
let FILTER = '';
let SELECTED = null;
let CACHE = [];

function token() { return localStorage.getItem('poolside_tenant_token'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function logout() {
  localStorage.removeItem('poolside_tenant_token');
  localStorage.removeItem('poolside_tenant_user');
  localStorage.removeItem('poolside_tenant_tenant');
  window.location.href = '/club/admin/login.html';
}
document.getElementById('signout').addEventListener('click', logout);

async function call(action, extra = {}) {
  const t = token();
  if (!t) { logout(); throw new Error('Not signed in'); }
  const res = await fetch(APPS_URL, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': `Bearer ${t}` },
    body: JSON.stringify({ action, ...extra }),
  });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res.json();
}

function fmtPhone(e164) {
  if (!e164) return '';
  const m = String(e164).match(/^\+1(\d{3})(\d{3})(\d{4})$/);
  return m ? `(${m[1]})-${m[2]}-${m[3]}` : String(e164);
}

document.querySelectorAll('#status-filter button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#status-filter button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    STATUS = b.dataset.status;
    refresh();
  });
});
document.querySelectorAll('#payment-filter button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#payment-filter button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    FILTER = b.dataset.filter;
    refresh();
  });
});

function render(rows) {
  const list = document.getElementById('list');
  if (!rows.length) {
    list.innerHTML = `<div class="empty">No ${STATUS === 'all' ? '' : STATUS + ' '}applications.</div>`;
    return;
  }
  list.innerHTML = rows.map(a => {
    const total = (a.num_adults || 0) + (a.num_kids || 0);
    return `
      <div class="app" data-id="${a.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px">
          <div style="flex:1;min-width:0">
            <h3 style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">${escapeHtml(a.family_name)} <span class="pill ${escapeHtml(a.status)}">${escapeHtml(a.status)}</span> ${paymentBadges(a)}</h3>
            <div class="meta">${escapeHtml(a.primary_name)}${a.primary_email ? ' · ' + escapeHtml(a.primary_email) : ''}${a.primary_phone ? ' · ' + escapeHtml(fmtPhone(a.primary_phone)) : ''} · ${a.num_adults} adults / ${a.num_kids} kids (${total} total)</div>
            ${a.body ? `<div class="body">${escapeHtml(a.body)}</div>` : ''}
            ${a.admin_notes ? `<div class="note">📝 ${escapeHtml(a.admin_notes)}</div>` : ''}
          </div>
          <div style="text-align:right;font-size:11px;color:var(--muted);min-width:100px">submitted<br>${escapeHtml(new Date(a.created_at).toLocaleDateString())}</div>
        </div>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.app').forEach(el => el.addEventListener('click', () => openModal(el.dataset.id, rows)));
}

async function refresh() {
  try {
    const data = await call('list', { status: STATUS, filter: FILTER });
    if (!data.ok) throw new Error(data.error || 'Failed to load');
    CACHE = data.applications || [];
    applySearch();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="empty" style="border-color:#fecaca;color:#7f1d1d">${escapeHtml(e.message)}</div>`;
  }
}

function applySearch() {
  const q = (document.getElementById('search')?.value || '').trim().toLowerCase();
  if (!q) { render(CACHE); return; }
  const filtered = CACHE.filter(a =>
    (a.family_name    || '').toLowerCase().includes(q) ||
    (a.primary_name   || '').toLowerCase().includes(q) ||
    (a.primary_email  || '').toLowerCase().includes(q) ||
    (a.primary_phone  || '').toLowerCase().includes(q) ||
    (a.address || a.city || '').toLowerCase().includes(q));
  render(filtered);
}

function paymentBadges(a) {
  const out = [];
  if (a.payment_method) out.push(`<span class="pill ${escapeHtml(a.payment_method)}">${a.payment_method === 'stripe' ? '💳 Stripe' : '💸 Venmo'}</span>`);
  if (a.status === 'approved' && a.payment_status !== 'paid') {
    const ageDays = a.decided_at ? Math.floor((Date.now() - new Date(a.decided_at).getTime()) / 86400_000) : 0;
    out.push(`<span class="pill unpaid">Unpaid${ageDays >= 10 ? ' · ' + ageDays + 'd' : ''}</span>`);
    if (ageDays >= 10) out.push(`<span class="pill overdue">Overdue</span>`);
  } else if (a.payment_status === 'paid') {
    out.push(`<span class="pill paid">Paid</span>`);
  }
  if (a.reminder_count > 0) out.push(`<span class="pill" style="background:var(--bg-2);color:var(--muted)">${a.reminder_count}× reminded</span>`);
  return out.join(' ');
}

function openModal(id, rows) {
  const a = (rows || CACHE).find(x => x.id === id);
  if (!a) return;
  SELECTED = a;
  document.getElementById('m-title').textContent = a.family_name;

  const adults   = Array.isArray(a.adults_json)   ? a.adults_json   : [];
  const children = Array.isArray(a.children_json) ? a.children_json : [];
  const waivers  = a.waivers_accepted && typeof a.waivers_accepted === 'object' ? a.waivers_accepted : {};

  const fobLine = a.is_new_member === false
    ? `Returning member${a.need_new_fob ? ' · needs new fob' : ''}${a.prior_fob_number ? ' · prior fob #' + escapeHtml(a.prior_fob_number) : ''}`
    : `New member${a.need_new_fob ? ' · needs fob' : ''}`;

  const adultsHTML = adults.length ? `
    <h3 style="margin-top:14px">Adults (${adults.length})</h3>
    <div class="roster">${adults.map((p, i) => `
      <div class="row">
        <div>
          <div class="who">${escapeHtml(p.name || '—')}${i === 0 ? ' <span class="pill" style="background:var(--blue-l);color:var(--blue);font-size:9px">primary</span>' : ''}</div>
          <div class="extra">${[p.email, p.phone ? fmtPhone(p.phone) : null].filter(Boolean).map(escapeHtml).join(' · ') || '<i style="color:var(--muted)">no contact</i>'}</div>
        </div>
        <div class="extra" style="white-space:nowrap">${p.signature_url ? '✓ signature' : ''}</div>
      </div>`).join('')}</div>` : '';

  const childrenHTML = children.length ? `
    <h3 style="margin-top:14px">Children (${children.length})</h3>
    <div class="roster">${children.map(c => {
      const dob = c.dob ? new Date(c.dob) : null;
      const yrs = dob ? Math.floor((Date.now() - dob.getTime()) / (365.25 * 86400_000)) : null;
      return `
      <div class="row">
        <div class="who">${escapeHtml(c.name || '—')}</div>
        <div class="extra">${dob ? escapeHtml(dob.toLocaleDateString()) + (yrs != null ? ' · ' + yrs + 'y' : '') : ''}${c.allergies ? ' · ⚠ ' + escapeHtml(c.allergies) : ''}</div>
      </div>`;
    }).join('')}</div>` : '';

  const waiverKeys = ['rules', 'guest', 'party', 'sitter', 'waiver'];
  const waiverHTML = `<div class="waivers">${waiverKeys.map(k =>
    `<span class="pill ${waivers[k] ? 'ok' : 'miss'}">${k}: ${waivers[k] ? '✓' : '✗'}</span>`
  ).join('')}</div>`;

  const sigHTML = (a.signature_primary || a.signature_guardian) ? `
    <h3 style="margin-top:14px">Signatures</h3>
    <div class="sig-grid">
      ${a.signature_primary ? `<div class="box"><img src="${a.signature_primary}" alt="primary signature"><div class="lbl">Primary applicant</div></div>` : ''}
      ${a.signature_guardian ? `<div class="box"><img src="${a.signature_guardian}" alt="guardian signature"><div class="lbl">Parent / guardian (for minors)</div></div>` : ''}
    </div>` : '';

  document.getElementById('m-info').innerHTML = `
    <div><b>${escapeHtml(a.primary_name)}</b>${a.primary_email ? ' · ' + escapeHtml(a.primary_email) : ''}${a.primary_phone ? ' · ' + escapeHtml(fmtPhone(a.primary_phone)) : ''}${a.alt_email ? '<div class="extra">alt: ' + escapeHtml(a.alt_email) + '</div>' : ''}</div>
    <div style="margin-top:6px"><b>Address:</b> ${escapeHtml([a.address, a.city, a.zip].filter(Boolean).join(', ') || '—')}</div>
    <div style="margin-top:6px"><b>Membership:</b> ${escapeHtml(fobLine)}</div>
    <div style="margin-top:6px"><b>Household:</b> ${a.num_adults} adults / ${a.num_kids} kids</div>
    <div style="margin-top:6px"><b>Status:</b> <span class="pill ${escapeHtml(a.status)}">${escapeHtml(a.status)}</span>${a.household_id ? ' · ✓ household created' : ''}</div>
    ${adultsHTML}
    ${childrenHTML}
    <h3 style="margin-top:14px">Policies</h3>
    ${waiverHTML}
    ${a.accepted_at ? `<div class="extra" style="font-size:11px;color:var(--muted);margin-top:6px">Accepted ${escapeHtml(new Date(a.accepted_at).toLocaleString())}</div>` : ''}
    ${sigHTML}
  `;
  document.getElementById('m-body').textContent = a.body || '(no notes from applicant)';
  document.getElementById('ov-tier').value = 'family';
  document.getElementById('ov-fob_number').value = '';
  document.getElementById('ov-paid_until_year').value = '';
  document.getElementById('m-admin_notes').value = a.admin_notes || '';
  document.getElementById('m-err').classList.remove('show');
  document.getElementById('m-approve').style.display = a.status === 'pending' ? 'inline-block' : 'none';
  document.getElementById('m-reject').style.display  = a.status === 'pending' ? 'inline-block' : 'none';
  // Verify button shows on approved + unpaid applications
  document.getElementById('m-verify').style.display =
    (a.status === 'approved' && a.payment_status !== 'paid') ? 'inline-block' : 'none';
  // Remind button shows on approved + unpaid
  document.getElementById('m-remind').style.display =
    (a.status === 'approved' && a.payment_status !== 'paid') ? 'inline-block' : 'none';
  document.getElementById('scrim').classList.add('open');
}
function closeM() { document.getElementById('scrim').classList.remove('open'); }

async function appr() {
  if (!SELECTED) return;
  const errEl = document.getElementById('m-err'); errEl.classList.remove('show');
  const override = {
    tier: document.getElementById('ov-tier').value,
    fob_number: document.getElementById('ov-fob_number').value.trim() || null,
    paid_until_year: document.getElementById('ov-paid_until_year').value || null,
  };
  try {
    const data = await call('approve', {
      id: SELECTED.id,
      override,
      admin_notes: document.getElementById('m-admin_notes').value.trim() || null,
    });
    if (!data.ok) throw new Error(data.error || 'Approve failed');
    closeM();
    await refresh();
  } catch (e) { errEl.textContent = e.message; errEl.classList.add('show'); }
}
async function rej() {
  if (!SELECTED) return;
  if (!confirm('Reject this application?')) return;
  try {
    const data = await call('reject', { id: SELECTED.id, admin_notes: document.getElementById('m-admin_notes').value.trim() || null });
    if (!data.ok) throw new Error(data.error || 'Reject failed');
    closeM();
    await refresh();
  } catch (e) { document.getElementById('m-err').textContent = e.message; document.getElementById('m-err').classList.add('show'); }
}

async function verifyClick() {
  if (!SELECTED) return;
  if (!confirm(`Mark Venmo payment from ${SELECTED.family_name} as verified?\n\nThis flips dues_paid_for_year=true on their household.`)) return;
  try {
    const data = await call('verify_payment', {
      id: SELECTED.id,
      method: SELECTED.payment_method || 'venmo',
      note: document.getElementById('m-admin_notes').value.trim() || null,
    });
    if (!data.ok) throw new Error(data.error || 'Verify failed');
    closeM();
    await refresh();
  } catch (e) { document.getElementById('m-err').textContent = e.message; document.getElementById('m-err').classList.add('show'); }
}

async function reminderClick() {
  if (!SELECTED) return;
  try {
    const data = await call('send_reminder', { id: SELECTED.id });
    if (!data.ok) throw new Error(data.error || 'Reminder failed');
    if (data.dev_link) {
      // Email isn't configured — open the mailto link so admin can fire it themselves
      const open = confirm("Email isn't configured yet (no Resend key). Open a pre-filled mailto draft instead?");
      if (open) window.open(data.dev_link, '_blank');
    } else {
      alert('✓ Reminder email sent.');
    }
    closeM();
    await refresh();
  } catch (e) { document.getElementById('m-err').textContent = e.message; document.getElementById('m-err').classList.add('show'); }
}

(async () => {
  if (!token()) { logout(); return; }
  try {
    const me = await fetch(ME_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token()}` },
      body: JSON.stringify({ action: 'me' }),
    }).then(r => r.json());
    if (!me.ok) { logout(); return; }
    document.title = `Applications — ${me.tenant.display_name}`;
    document.getElementById('whoami').textContent = me.user.display_name || me.user.email;
    if (window.PoolsideFlags) PoolsideFlags.apply((me.tenant && me.tenant.features) || {});
  } catch { logout(); return; }
  await refresh();
})();
</script>
</body>
