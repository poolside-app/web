<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Volunteer — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 16px/1.55 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--blue); }
  h1, h2, h3 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 26px; } h2 { font-size: 18px; margin-bottom: 12px; } h3 { font-size: 15px; margin: 0 0 8px; }
  .logo { display: inline-flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; color: var(--blue); text-decoration: none; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header { padding: 14px 22px; border-bottom: 1px solid var(--border); background:#fff; display: flex; justify-content: space-between; align-items: center; }
  .who { font-size: 13px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .who a { cursor: pointer; }
  nav.tabs { background: #fff; border-bottom: 1px solid var(--border); padding: 0 22px; display: flex; gap: 4px; overflow-x: auto; }
  nav.tabs a { padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; text-decoration: none; margin-bottom: -1px; white-space: nowrap; }
  nav.tabs a.on { color: var(--blue); border-bottom-color: var(--blue); }
  nav.tabs a:hover { color: var(--blue); }
  main { flex: 1; padding: 28px 22px; max-width: 880px; width: 100%; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .btn { padding: 10px 18px; border-radius: var(--r-md); font: 600 13px 'Inter'; cursor: pointer; border: 1.5px solid transparent; background: var(--blue); color: #fff; }
  .btn:hover { background: var(--blue-2); }
  .btn-ghost { background: transparent; color: var(--blue); border-color: var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .opp { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 22px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
  .opp:hover { border-color: var(--blue); }
  .opp h3 { font-size: 16px; }
  .opp .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .opp .desc { font-size: 13px; color: var(--text); margin-top: 6px; line-height: 1.5; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .pill.full { background: #fee2e2; color: #7f1d1d; }
  .pill.open { background: #dcfce7; color: #14532d; }
  .pill.inact { background: #f3f4f6; color: #4b5563; }
  .empty { padding: 60px 22px; text-align: center; color: var(--muted); border: 2px dashed var(--border); border-radius: var(--r-md); }
  .scrim { position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 32px 16px; z-index: 50; }
  .scrim.open { display: flex; }
  .modal { background: #fff; border-radius: var(--r-lg); padding: 26px; width: 100%; max-width: 580px; box-shadow: 0 20px 60px rgba(10,59,92,.18); }
  .modal label { display: block; font-weight: 600; font-size: 12px; margin: 12px 0 4px; }
  .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 12px; font: 14px/1.4 'Inter'; border: 1.5px solid var(--border); border-radius: 10px; background: #fff; font-family: inherit; }
  .modal textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .modal-foot .left { margin-right: auto; }
  .err { display:none; margin-top:12px; padding:10px 14px; font-size:13px; background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; }
  .err.show { display: block; }
  .roster-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .roster-row:last-child { border-bottom: 0; }
  .roster-row .who { font-size: 14px; }
  .roster-row .who small { color: var(--muted); display: block; font-size: 11px; }
  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-dot"></span> Poolside</a>
  <div class="who"><span id="whoami">…</span><a id="signout">Sign out</a></div>
</header>
<nav class="tabs">
  <a href="/club/admin/">Dashboard</a>
  <a href="/club/admin/members.html" class="on">Members</a>
  <a href="/club/admin/events.html">Calendar</a>
  <a href="/club/admin/announcements.html">Announcements</a>
  <a href="/club/admin/campaigns.html">Campaigns</a>
  <a href="/club/admin/policies.html">Policies</a>
  <a href="/club/admin/photos.html">Photos</a>
  <a href="/club/admin/impact.html">Impact</a>
  <a href="/club/admin/settings.html">Settings</a>
</nav>
<script src="/js/admin-flags.js"></script>
<div id="members-subtabs"></div>
<script src="/js/members-subtabs.js"></script>

<main>
  <div class="toolbar">
    <div>
      <h1>Volunteer</h1>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Snack-bar shifts, swim-meet timers, party helpers — anywhere you need a few volunteers.</div>
    </div>
    <button class="btn" onclick="openCreate()">+ New opportunity</button>
  </div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>

<div class="scrim" id="scrim-edit">
  <div class="modal">
    <h2 id="m-title">New opportunity</h2>
    <label>Title *</label>
    <input id="m-name" maxlength="140" placeholder="e.g. Snack-bar shift Saturday meet">
    <label>Description</label>
    <textarea id="m-description" maxlength="800" placeholder="What the volunteer will do, what to bring, who to coordinate with."></textarea>
    <div class="row2">
      <div><label>Starts *</label><input id="m-starts_at" type="datetime-local"></div>
      <div><label>Ends</label><input id="m-ends_at" type="datetime-local"></div>
    </div>
    <div class="row2">
      <div><label>Slots needed</label><input id="m-slots" type="number" min="1" value="2"></div>
      <div><label>Location</label><input id="m-location" maxlength="120" placeholder="e.g. Snack bar"></div>
    </div>
    <div class="err" id="m-err"></div>
    <div class="modal-foot">
      <button class="btn btn-danger left" id="m-delete" style="display:none" onclick="del()">Archive</button>
      <button class="btn btn-ghost" onclick="closeM()">Cancel</button>
      <button class="btn" id="m-save" onclick="save()">Save</button>
    </div>
  </div>
</div>

<div class="scrim" id="scrim-roster">
  <div class="modal" style="max-width:520px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px">
      <div>
        <h2 id="r-title">Volunteers</h2>
        <div id="r-meta" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
      </div>
      <button class="btn btn-sm" onclick="closeRoster()">Close</button>
    </div>
    <hr style="margin:14px 0;border:0;border-top:1px solid var(--border)">
    <div id="r-list"></div>
  </div>
</div>

<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const URL_BASE     = `${SUPABASE_URL}/functions/v1/volunteer`;
const ME_URL       = `${SUPABASE_URL}/functions/v1/tenant_admin_auth`;

let CACHE = [];
let EDITING = null;
let ROSTER_OPP = null;

function token() { return localStorage.getItem('poolside_tenant_token'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function logout() { ['poolside_tenant_token','poolside_tenant_user','poolside_tenant_tenant'].forEach(k => localStorage.removeItem(k)); window.location.href = '/club/admin/login.html'; }
document.getElementById('signout').addEventListener('click', logout);

async function call(action, extra = {}) {
  const t = token();
  if (!t) { logout(); throw new Error('Not signed in'); }
  const res = await fetch(URL_BASE, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': `Bearer ${t}` },
    body: JSON.stringify({ action, ...extra }),
  });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res.json();
}

function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }); }
function toLocalInput(iso) { if (!iso) return ''; const d = new Date(iso); if (isNaN(d.getTime())) return ''; const pad = n => String(n).padStart(2, '0'); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fromLocalInput(v) { if (!v) return null; const d = new Date(v); return isNaN(d.getTime()) ? null : d.toISOString(); }

function render() {
  const list = document.getElementById('list');
  if (!CACHE.length) { list.innerHTML = `<div class="empty">No upcoming volunteer opportunities. Click <b>+ New opportunity</b>.</div>`; return; }
  list.innerHTML = CACHE.map(o => {
    const filled = o.slots_filled ?? 0;
    const need = o.slots_needed ?? 0;
    const isFull = filled >= need;
    return `
      <div class="opp" data-id="${o.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px">
          <div style="flex:1;min-width:0">
            <h3>${escapeHtml(o.title)} ${o.active ? (isFull ? '<span class="pill full">filled</span>' : `<span class="pill open">${filled}/${need}</span>`) : '<span class="pill inact">archived</span>'}</h3>
            <div class="meta">${escapeHtml(fmtDate(o.starts_at))}${o.ends_at ? ' → ' + escapeHtml(new Date(o.ends_at).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})) : ''}${o.location ? ' · ' + escapeHtml(o.location) : ''}</div>
            ${o.description ? `<div class="desc">${escapeHtml(o.description)}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-sm" onclick="event.stopPropagation();openRoster('${o.id}')">Roster (${filled})</button>
            <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openEdit('${o.id}')">Edit</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function refresh() {
  try {
    const data = await call('list');
    if (!data.ok) throw new Error(data.error || 'Failed to load');
    CACHE = data.opportunities || [];
    render();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="empty" style="border-color:#fecaca;color:#7f1d1d">${escapeHtml(e.message)}</div>`;
  }
}

function openCreate() {
  EDITING = null;
  document.getElementById('m-title').textContent = 'New opportunity';
  document.getElementById('m-delete').style.display = 'none';
  document.getElementById('m-name').value = '';
  document.getElementById('m-description').value = '';
  document.getElementById('m-slots').value = '2';
  document.getElementById('m-location').value = '';
  const start = new Date(); start.setDate(start.getDate() + 7); start.setHours(10, 0, 0, 0);
  document.getElementById('m-starts_at').value = toLocalInput(start.toISOString());
  document.getElementById('m-ends_at').value = '';
  document.getElementById('m-err').classList.remove('show');
  document.getElementById('scrim-edit').classList.add('open');
}

function openEdit(id) {
  const o = CACHE.find(x => x.id === id);
  if (!o) return;
  EDITING = o;
  document.getElementById('m-title').textContent = 'Edit opportunity';
  document.getElementById('m-delete').style.display = o.active ? 'inline-block' : 'none';
  document.getElementById('m-name').value = o.title || '';
  document.getElementById('m-description').value = o.description || '';
  document.getElementById('m-slots').value = o.slots_needed ?? 1;
  document.getElementById('m-location').value = o.location || '';
  document.getElementById('m-starts_at').value = toLocalInput(o.starts_at);
  document.getElementById('m-ends_at').value   = toLocalInput(o.ends_at);
  document.getElementById('m-err').classList.remove('show');
  document.getElementById('scrim-edit').classList.add('open');
}
function closeM() { document.getElementById('scrim-edit').classList.remove('open'); }

async function save() {
  const errEl = document.getElementById('m-err'); errEl.classList.remove('show');
  const payload = {
    title:        document.getElementById('m-name').value.trim(),
    description:  document.getElementById('m-description').value.trim(),
    slots_needed: Math.max(0, parseInt(document.getElementById('m-slots').value, 10) || 0),
    location:     document.getElementById('m-location').value.trim(),
    starts_at:    fromLocalInput(document.getElementById('m-starts_at').value),
    ends_at:      fromLocalInput(document.getElementById('m-ends_at').value),
  };
  if (!payload.title)     { errEl.textContent = 'Title is required'; errEl.classList.add('show'); return; }
  if (!payload.starts_at) { errEl.textContent = 'Start time is required'; errEl.classList.add('show'); return; }
  try {
    const r = EDITING ? await call('update', { id: EDITING.id, ...payload }) : await call('create', payload);
    if (!r.ok) throw new Error(r.error || 'Save failed');
    closeM(); await refresh();
  } catch (e) { errEl.textContent = e.message; errEl.classList.add('show'); }
}

async function del() {
  if (!EDITING) return;
  if (!confirm(`Archive "${EDITING.title}"? Existing volunteers stay; new sign-ups are blocked.`)) return;
  const r = await call('delete', { id: EDITING.id });
  if (!r.ok) { document.getElementById('m-err').textContent = r.error || 'Delete failed'; document.getElementById('m-err').classList.add('show'); return; }
  closeM(); await refresh();
}

async function openRoster(id) {
  const r = await call('roster', { opportunity_id: id });
  if (!r.ok) { alert(r.error || 'Failed to load roster'); return; }
  ROSTER_OPP = r.opportunity;
  document.getElementById('r-title').textContent = r.opportunity.title;
  document.getElementById('r-meta').textContent = `${fmtDate(r.opportunity.starts_at)} · need ${r.opportunity.slots_needed}`;
  const list = document.getElementById('r-list');
  if (!r.signups.length) {
    list.innerHTML = `<div class="empty" style="padding:30px;border-radius:10px">No volunteers yet.</div>`;
  } else {
    list.innerHTML = r.signups.map(s => `
      <div class="roster-row">
        <div class="who">
          <div>${escapeHtml(s.volunteer_name)} <span class="pill ${s.status === 'confirmed' ? 'open' : 'inact'}">${escapeHtml(s.status)}</span></div>
          <small>${escapeHtml(s.family_name || '—')}${s.notes ? ' · ' + escapeHtml(s.notes) : ''}</small>
        </div>
        ${s.status !== 'cancelled' ? `<button class="btn btn-sm btn-danger" onclick="cancelSignup('${s.id}')">Cancel</button>` : ''}
      </div>`).join('');
  }
  document.getElementById('scrim-roster').classList.add('open');
}
function closeRoster() { document.getElementById('scrim-roster').classList.remove('open'); ROSTER_OPP = null; }
async function cancelSignup(sid) {
  if (!confirm('Cancel this signup?')) return;
  const r = await call('cancel_admin', { signup_id: sid });
  if (!r.ok) { alert(r.error || 'Failed'); return; }
  await openRoster(ROSTER_OPP.id);
  await refresh();
}

(async () => {
  if (!token()) { logout(); return; }
  try {
    const me = await fetch(ME_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token()}` },
      body: JSON.stringify({ action: 'me' }),
    }).then(r => r.json());
    if (!me.ok) { logout(); return; }
    document.title = `Volunteer — ${me.tenant.display_name}`;
    document.getElementById('whoami').textContent = me.user.display_name || me.user.email;
    if (window.PoolsideFlags) PoolsideFlags.apply((me.tenant && me.tenant.features) || {}, me.user, me.tenant);
  } catch { logout(); return; }
  await refresh();
})();
</script>
</body>
</html>
