<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Campaigns — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 16px/1.55 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  a { color: var(--blue); }
  h1, h2, h3 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 26px; } h2 { font-size: 18px; margin-bottom: 12px; }
  .logo { display: inline-flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; color: var(--blue); text-decoration: none; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header { padding: 14px 22px; border-bottom: 1px solid var(--border); background:#fff; display: flex; justify-content: space-between; align-items: center; }
  .who { font-size: 13px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .who a { cursor: pointer; }
  nav.tabs { background: #fff; border-bottom: 1px solid var(--border); padding: 0 22px; display: flex; gap: 4px; overflow-x: auto; }
  nav.tabs a { padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; text-decoration: none; margin-bottom: -1px; white-space: nowrap; }
  nav.tabs a.on { color: var(--blue); border-bottom-color: var(--blue); }
  nav.tabs a:hover { color: var(--blue); }
  main { flex: 1; padding: 28px 22px; max-width: 880px; width: 100%; margin: 0 auto; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .btn { padding: 10px 18px; border-radius: var(--r-md); font: 600 13px 'Inter'; cursor: pointer; border: 1.5px solid transparent; background: var(--blue); color: #fff; }
  .btn:hover { background: var(--blue-2); }
  .btn-ghost { background: transparent; color: var(--blue); border-color: var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .camp { background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 22px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
  .camp:hover { border-color: var(--blue); }
  .camp h3 { font-size: 16px; }
  .camp .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .camp .body { font-size: 13px; margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .pill.on { background: #dcfce7; color: #14532d; }
  .pill.off { background: #f3f4f6; color: #4b5563; }
  .pill.fundraiser { background: #fef3c7; color: #92400e; }
  .pill.event { background: #dbeafe; color: #1e3a8a; }
  .pill.signup { background: #dcfce7; color: #14532d; }
  .pill.announcement { background: #e0e7ff; color: #3730a3; }
  .empty { padding: 60px 22px; text-align: center; color: var(--muted); border: 2px dashed var(--border); border-radius: var(--r-md); }
  .scrim { position: fixed; inset: 0; background: rgba(15,23,42,.55); display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 32px 16px; z-index: 50; }
  .scrim.open { display: flex; }
  .modal { background: #fff; border-radius: var(--r-lg); padding: 26px; width: 100%; max-width: 580px; box-shadow: 0 20px 60px rgba(10,59,92,.18); }
  .modal label { display: block; font-weight: 600; font-size: 12px; margin: 12px 0 4px; }
  .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 12px; font: 14px/1.4 'Inter'; border: 1.5px solid var(--border); border-radius: 10px; background: #fff; font-family: inherit; }
  .modal textarea { resize: vertical; min-height: 80px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .modal-foot .left { margin-right: auto; }
  .err { display:none; margin-top:12px; padding:10px 14px; font-size:13px; background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; }
  .err.show { display: block; }
  .preview { background: linear-gradient(135deg, var(--blue), var(--blue-2)); color: #fff; border-radius: 14px; padding: 18px; margin-top: 8px; }
  .preview .pe { font-size: 32px; }
  .preview .pt { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin: 6px 0 4px; }
  .preview .pb { font-size: 13px; opacity: .9; line-height: 1.5; }
  .preview .pcta { display: inline-block; margin-top: 10px; background: #fff; color: var(--blue); padding: 8px 16px; border-radius: 10px; font-weight: 600; font-size: 13px; text-decoration: none; }
  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-dot"></span> Poolside</a>
  <div class="who"><span id="whoami">…</span><a id="signout">Sign out</a></div>
</header>
<nav class="tabs">
  <a href="/club/admin/">Dashboard</a>
  <a href="/club/admin/members.html">Members</a>
  <a href="/club/admin/events.html">Calendar</a>
  <a href="/club/admin/announcements.html">Announcements</a>
  <a href="/club/admin/campaigns.html" class="on">Campaigns</a>
  <a href="/club/admin/emails.html">Emails</a>
  <a href="/club/admin/policies.html">Policies</a>
  <a href="/club/admin/photos.html">Photos</a>
  <a href="/club/admin/impact.html">Impact</a>
  <a href="/club/admin/settings.html">Settings</a>
</nav>
<script src="/js/admin-flags.js"></script>

<main>
  <div class="toolbar">
    <div>
      <h1>Campaigns</h1>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Pop-up modals shown to members on app open. Best for one-shot pushes (RSVPs, fundraisers, signup links).</div>
    </div>
    <button class="btn" onclick="openCreate()">+ New campaign</button>
  </div>
  <div id="list"><div class="empty">Loading…</div></div>
</main>

<div class="scrim" id="scrim">
  <div class="modal">
    <h2 id="m-title">New campaign</h2>
    <label>Title *</label>
    <input id="m-name" maxlength="140" placeholder="e.g. Annual fund drive">
    <div class="row2">
      <div>
        <label>Kind</label>
        <select id="m-kind">
          <option value="announcement">Announcement</option>
          <option value="event">Event</option>
          <option value="fundraiser">Fundraiser</option>
          <option value="signup">Signup</option>
        </select>
      </div>
      <div>
        <label>Audience</label>
        <select id="m-audience">
          <option value="members">Members only</option>
          <option value="public">Public landing only</option>
          <option value="both">Both</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div><label>Emoji</label><input id="m-emoji" maxlength="4" placeholder="📣"></div>
      <div></div>
    </div>
    <label>Body</label>
    <textarea id="m-body" maxlength="800" placeholder="A few sentences. Members see it as a pop-up — keep it short."></textarea>
    <div class="row2">
      <div><label>Button label</label><input id="m-cta_label" maxlength="40" placeholder="e.g. Donate now"></div>
      <div><label>Button URL</label><input id="m-cta_url" type="url" placeholder="https://…"></div>
    </div>
    <div class="row2">
      <div><label>Starts</label><input id="m-starts_at" type="datetime-local"></div>
      <div><label>Ends <span style="color:var(--muted);font-weight:500;font-size:11px">(optional)</span></label><input id="m-ends_at" type="datetime-local"></div>
    </div>
    <div id="m-preview"></div>
    <div class="err" id="m-err"></div>
    <div class="modal-foot">
      <button class="btn btn-danger left" id="m-delete" style="display:none" onclick="del()">Archive</button>
      <button class="btn btn-ghost" onclick="closeM()">Cancel</button>
      <button class="btn" id="m-save" onclick="save()">Save</button>
    </div>
  </div>
</div>

<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const URL_BASE     = `${SUPABASE_URL}/functions/v1/campaigns`;
const ME_URL       = `${SUPABASE_URL}/functions/v1/tenant_admin_auth`;

let CACHE = [];
let EDITING = null;

function token() { return localStorage.getItem('poolside_tenant_token'); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function logout() { ['poolside_tenant_token','poolside_tenant_user','poolside_tenant_tenant'].forEach(k => localStorage.removeItem(k)); window.location.href = '/club/admin/login.html'; }
document.getElementById('signout').addEventListener('click', logout);

async function call(action, extra = {}) {
  const t = token();
  if (!t) { logout(); throw new Error('Not signed in'); }
  const res = await fetch(URL_BASE, {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'authorization': `Bearer ${t}` },
    body: JSON.stringify({ action, ...extra }),
  });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  return res.json();
}

function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }); }
function isLive(c) {
  if (!c.active) return false;
  const now = Date.now();
  if (new Date(c.starts_at).getTime() > now) return false;
  if (c.ends_at && new Date(c.ends_at).getTime() < now) return false;
  return true;
}

function render() {
  const list = document.getElementById('list');
  if (!CACHE.length) { list.innerHTML = `<div class="empty">No campaigns yet. Click <b>+ New campaign</b>.</div>`; return; }
  list.innerHTML = CACHE.map(c => `
    <div class="camp" data-id="${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px">
        <div style="flex:1;min-width:0">
          <h3>${c.emoji || '📣'} ${escapeHtml(c.title)} <span class="pill ${escapeHtml(c.kind)}">${escapeHtml(c.kind)}</span> ${isLive(c) ? '<span class="pill on">live</span>' : '<span class="pill off">' + (c.active ? 'scheduled' : 'archived') + '</span>'}</h3>
          <div class="meta">${escapeHtml(c.audience)} · ${escapeHtml(fmtDate(c.starts_at))}${c.ends_at ? ' → ' + escapeHtml(fmtDate(c.ends_at)) : ' (no end)'}${c.cta_label ? ' · CTA: ' + escapeHtml(c.cta_label) : ''}</div>
          ${c.body ? `<div class="body">${escapeHtml(c.body)}</div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.camp').forEach(el => el.addEventListener('click', () => openEdit(el.dataset.id)));
}

async function refresh() {
  try {
    const data = await call('list');
    if (!data.ok) throw new Error(data.error || 'Failed to load');
    CACHE = data.campaigns || [];
    render();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="empty" style="border-color:#fecaca;color:#7f1d1d">${escapeHtml(e.message)}</div>`;
  }
}

function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fromLocalInput(v) {
  if (!v) return null;
  const d = new Date(v);
  return isNaN(d.getTime()) ? null : d.toISOString();
}

function paintPreview() {
  const title = document.getElementById('m-name').value || 'Campaign title';
  const body  = document.getElementById('m-body').value;
  const emoji = document.getElementById('m-emoji').value || '📣';
  const ctaL  = document.getElementById('m-cta_label').value;
  const ctaU  = document.getElementById('m-cta_url').value;
  document.getElementById('m-preview').innerHTML = `
    <div style="font-size:11px;color:var(--muted);font-weight:600;margin:14px 0 4px">PREVIEW</div>
    <div class="preview">
      <div class="pe">${escapeHtml(emoji)}</div>
      <div class="pt">${escapeHtml(title)}</div>
      ${body ? `<div class="pb">${escapeHtml(body)}</div>` : ''}
      ${ctaL ? `<a class="pcta" href="${escapeHtml(ctaU || '#')}" target="_blank" rel="noopener">${escapeHtml(ctaL)}</a>` : ''}
    </div>`;
}
['m-name','m-body','m-emoji','m-cta_label','m-cta_url'].forEach(id => {
  document.getElementById(id).addEventListener('input', paintPreview);
});

function openCreate() {
  EDITING = null;
  document.getElementById('m-title').textContent = 'New campaign';
  document.getElementById('m-delete').style.display = 'none';
  document.getElementById('m-name').value = '';
  document.getElementById('m-body').value = '';
  document.getElementById('m-emoji').value = '📣';
  document.getElementById('m-kind').value = 'announcement';
  document.getElementById('m-audience').value = 'members';
  document.getElementById('m-cta_label').value = '';
  document.getElementById('m-cta_url').value = '';
  const now = new Date(); now.setSeconds(0,0);
  document.getElementById('m-starts_at').value = toLocalInput(now.toISOString());
  document.getElementById('m-ends_at').value = '';
  document.getElementById('m-err').classList.remove('show');
  paintPreview();
  document.getElementById('scrim').classList.add('open');
}

function openEdit(id) {
  const c = CACHE.find(x => x.id === id);
  if (!c) return;
  EDITING = c;
  document.getElementById('m-title').textContent = 'Edit campaign';
  document.getElementById('m-delete').style.display = c.active ? 'inline-block' : 'none';
  document.getElementById('m-name').value = c.title || '';
  document.getElementById('m-body').value = c.body || '';
  document.getElementById('m-emoji').value = c.emoji || '📣';
  document.getElementById('m-kind').value = c.kind || 'announcement';
  document.getElementById('m-audience').value = c.audience || 'members';
  document.getElementById('m-cta_label').value = c.cta_label || '';
  document.getElementById('m-cta_url').value = c.cta_url || '';
  document.getElementById('m-starts_at').value = toLocalInput(c.starts_at);
  document.getElementById('m-ends_at').value   = toLocalInput(c.ends_at);
  document.getElementById('m-err').classList.remove('show');
  paintPreview();
  document.getElementById('scrim').classList.add('open');
}
function closeM() { document.getElementById('scrim').classList.remove('open'); }

async function save() {
  const errEl = document.getElementById('m-err'); errEl.classList.remove('show');
  const payload = {
    title:     document.getElementById('m-name').value.trim(),
    body:      document.getElementById('m-body').value.trim(),
    emoji:     document.getElementById('m-emoji').value.trim() || '📣',
    kind:      document.getElementById('m-kind').value,
    audience:  document.getElementById('m-audience').value,
    cta_label: document.getElementById('m-cta_label').value.trim(),
    cta_url:   document.getElementById('m-cta_url').value.trim(),
    starts_at: fromLocalInput(document.getElementById('m-starts_at').value),
    ends_at:   fromLocalInput(document.getElementById('m-ends_at').value),
  };
  if (!payload.title) { errEl.textContent = 'Title is required'; errEl.classList.add('show'); return; }
  try {
    const r = EDITING ? await call('update', { id: EDITING.id, ...payload }) : await call('create', payload);
    if (!r.ok) throw new Error(r.error || 'Save failed');
    closeM(); await refresh();
  } catch (e) { errEl.textContent = e.message; errEl.classList.add('show'); }
}

async function del() {
  if (!EDITING) return;
  if (!confirm('Archive this campaign? Members will stop seeing the pop-up.')) return;
  const r = await call('delete', { id: EDITING.id });
  if (!r.ok) { document.getElementById('m-err').textContent = r.error || 'Delete failed'; document.getElementById('m-err').classList.add('show'); return; }
  closeM(); await refresh();
}

(async () => {
  if (!token()) { logout(); return; }
  try {
    const me = await fetch(ME_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'authorization': `Bearer ${token()}` },
      body: JSON.stringify({ action: 'me' }),
    }).then(r => r.json());
    if (!me.ok) { logout(); return; }
    document.title = `Campaigns — ${me.tenant.display_name}`;
    document.getElementById('whoami').textContent = me.user.display_name || me.user.email;
    if (window.PoolsideFlags) PoolsideFlags.apply((me.tenant && me.tenant.features) || {}, me.user, me.tenant, me.usage);
  } catch { logout(); return; }
  await refresh();
})();
</script>
</body>
</html>
