<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Loading…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/js/calendar.css">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.55 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  a { color: var(--blue); }
  h1 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; line-height: 1.05; }
  h1 { font-size: clamp(36px, 7vw, 64px); }
  h2 { font-family:'Fraunces', Georgia, serif; font-weight:600; margin:0; font-size: 22px; }

  /* Sticky top bar */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(255, 255, 255, .92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 12px 22px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .topbar.translucent {
    background: rgba(10, 59, 92, .25);
    border-bottom-color: rgba(255, 255, 255, .15);
  }
  .topbar.translucent a, .topbar.translucent .name { color: #fff; }
  .name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; color: var(--blue); }
  .topbar a {
    font-size: 13px; font-weight: 600; text-decoration: none;
    padding: 8px 14px; border-radius: 8px;
    transition: background .12s;
  }
  .topbar a:hover { background: rgba(0,0,0,.05); }
  .topbar.translucent a:hover { background: rgba(255,255,255,.15); }

  /* Hero */
  .hero {
    flex: 1;
    position: relative;
    min-height: 78vh;
    display: flex; flex-direction: column; justify-content: center;
    color: #fff;
    padding: 100px 22px 80px;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: -1;
    background: linear-gradient(160deg, #0a3b5c 0%, #134b73 60%, #1e3a5f 100%);
    background-size: cover; background-position: center;
  }
  .hero-bg.with-photo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,59,92,.55), rgba(10,59,92,.78));
  }
  .hero-inner {
    max-width: 720px; margin: 0 auto; text-align: center; width: 100%;
  }
  .eyebrow {
    display: inline-block; padding: 5px 14px; border-radius: 999px;
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
    font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
    margin-bottom: 18px;
  }
  .tagline { font-size: clamp(15px, 2vw, 18px); margin-top: 18px; opacity: .92; max-width: 520px; margin-left: auto; margin-right: auto; }
  .location { margin-top: 20px; font-size: 14px; opacity: .8; }
  .actions { margin-top: 36px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-block; padding: 13px 26px;
    background: #fff; color: var(--blue);
    border: 0; border-radius: var(--r-md);
    font: 600 15px 'Inter', sans-serif; cursor: pointer; text-decoration: none;
    transition: transform .12s;
  }
  .btn:hover { transform: translateY(-1px); text-decoration: none; }
  .btn.ghost { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.5); }
  .btn.ghost:hover { background: rgba(255,255,255,.1); }

  /* Info strip */
  .strip {
    background: var(--bg-2); padding: 28px 22px;
    display: flex; gap: 32px; flex-wrap: wrap; justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  /* Upcoming events */
  .events {
    max-width: 720px; margin: 0 auto; padding: 40px 22px 8px;
  }
  .events h2 {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600;
    font-size: 24px; color: var(--blue); margin: 0 0 18px;
  }
  .ev {
    display: flex; gap: 14px; align-items: flex-start;
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 14px 18px;
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .ev-date {
    flex-shrink: 0; width: 56px; text-align: center;
    background: var(--bg-2); border-radius: 8px; padding: 8px 0;
  }
  .ev-date .mo { font-size: 11px; color: var(--blue); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  .ev-date .da { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--blue); line-height: 1.1; }
  .ev-body { flex: 1; min-width: 0; }
  .ev-title { font-weight: 600; font-size: 15px; }
  .ev-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ev-loc  { font-size: 12px; color: var(--blue); margin-top: 2px; }

  /* Photo gallery */
  .gallery { max-width: 1100px; margin: 0 auto; padding: 40px 22px 8px; }
  .gallery h2 {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600;
    font-size: 24px; color: var(--blue); margin: 0 0 18px;
  }
  .ggrid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }
  .ggrid .gtile {
    aspect-ratio: 1; overflow: hidden; border-radius: var(--r-md);
    background: var(--bg-2); border: 1px solid var(--border); cursor: pointer;
  }
  .ggrid .gtile img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
  .ggrid .gtile:hover img { transform: scale(1.05); }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 22px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; }
  .lightbox .close, .lightbox .nav {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,.15); color: #fff; border: 0;
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    font-size: 22px; display: flex; align-items: center; justify-content: center;
  }
  .lightbox .nav { top: 50%; transform: translateY(-50%); }
  .lightbox .nav.prev { left: 16px; right: auto; }
  .lightbox .nav.next { right: 16px; }
  .lightbox .cap {
    position: absolute; bottom: 22px; left: 0; right: 0;
    text-align: center; color: #fff; font-size: 14px; padding: 0 22px;
  }

  /* Posts */
  .news {
    max-width: 720px; margin: 0 auto; padding: 48px 22px;
  }
  .news h2 {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600;
    font-size: 24px; color: var(--blue); margin: 0 0 22px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .news h2 .count { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); }
  .post {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 22px 24px; margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .post.pinned { border-left: 4px solid var(--sun); }
  .post-title { font-family:'Fraunces', Georgia, serif; font-weight: 600; font-size: 20px; color: var(--blue); margin: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .post-meta { font-size: 12px; color: var(--muted); margin: 4px 0 12px; }
  .post-body { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--text); }
  .pin-pill { background:#fef3c7; color:#92400e; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .04em; text-transform: uppercase; }
  .stat {
    text-align: center; min-width: 140px;
  }
  .stat .lbl {
    font-size: 11px; color: var(--muted);
    font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 4px;
  }
  .stat .val { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--blue); }

  /* Pill */
  .pill {
    display: inline-block; padding: 4px 12px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  }
  .pill.trial    { background: #fef3c7; color: #92400e; }
  .pill.active   { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.3); }
  .pill.suspended{ background: #fee2e2; color: #7f1d1d; }
  .pill.churned  { background: #f3f4f6; color: #4b5563; }
  .pill.float    { position: absolute; top: 18px; right: 22px; }

  footer { padding: 22px; text-align: center; font-size: 12px; color: var(--muted); }
  .err {
    max-width: 480px; margin: 60px auto; padding: 28px 22px;
    text-align: center; background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-lg); box-shadow: var(--shadow);
  }

  @media (max-width: 600px) {
    .topbar a { padding: 6px 10px; font-size: 12px; }
    .hero { padding: 80px 16px 60px; min-height: 70vh; }
    .strip { gap: 18px; padding: 22px 16px; }
  }
</style>
</head>
<body>
<div class="topbar" id="topbar">
  <span class="name" id="club-name">Loading…</span>
  <a id="admin-link" href="/club/admin/login.html">Admin sign in</a>
</div>

<div id="root"></div>

<script src="/js/calendar.js"></script>

<div class="lightbox" id="lightbox" onclick="if (event.target === this) closeLightbox()">
  <button class="close" onclick="closeLightbox()" aria-label="Close">×</button>
  <button class="nav prev" onclick="lbStep(-1)" aria-label="Previous">‹</button>
  <button class="nav next" onclick="lbStep(+1)" aria-label="Next">›</button>
  <img id="lb-img" alt="">
  <div class="cap" id="lb-cap"></div>
</div>

<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const PUBLIC_LOOKUP = `${SUPABASE_URL}/functions/v1/tenant_public`;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) {
  return String(s ?? '').replace(/["']/g, c => ({'"':'&quot;',"'":'&#39;'}[c]));
}

function getSlugFromHostname() {
  const host = window.location.hostname;
  const m = host.match(/^([a-z0-9][a-z0-9-]*)\.poolsideapp\.com$/i);
  if (!m) return null;
  if (['www','admin','api','app'].includes(m[1].toLowerCase())) return null;
  return m[1].toLowerCase();
}

function fmtTime12(hhmm) {
  if (!hhmm) return null;
  const m = String(hhmm).match(/^(\d{1,2}):(\d{2})/);
  if (!m) return hhmm;
  let h = parseInt(m[1], 10);
  const mm = m[2];
  const ampm = h < 12 ? 'AM' : 'PM';
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return mm === '00' ? `${h} ${ampm}` : `${h}:${mm} ${ampm}`;
}

function renderNotFound(slug) {
  document.title = 'Club not found — Poolside';
  document.getElementById('club-name').textContent = 'Poolside';
  document.getElementById('root').innerHTML = `
    <div class="err">
      <h1 style="font-size:28px;margin-bottom:8px">Club not found</h1>
      <p style="color:var(--muted)">There's no Poolside club at <b>${escapeHtml(slug ?? window.location.hostname)}</b>.</p>
      <p style="margin-top:18px"><a href="https://poolsideapp.com/signup.html" style="font-weight:600">Start your own club →</a></p>
    </div>
  `;
}

function fmtPostDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

const KIND_ICON = {
  event: '📅', party: '🎉', swim_meet: '🏊‍♀️', social: '🥳',
  closure: '🚫', holiday: '🎆', lesson: '🏫', meeting: '📋',
};
const KIND_LABEL = {
  event: 'Event', party: 'Party', swim_meet: 'Swim meet', social: 'Social',
  closure: 'Closure', holiday: 'Holiday', lesson: 'Lesson', meeting: 'Meeting',
};
function fmtEventTime(ev) {
  const start = new Date(ev.starts_at);
  if (ev.all_day) return 'All day';
  const opts = { hour: 'numeric', minute: '2-digit' };
  if (!ev.ends_at) return start.toLocaleTimeString(undefined, opts);
  const end = new Date(ev.ends_at);
  if (start.toDateString() === end.toDateString()) {
    return `${start.toLocaleTimeString(undefined, opts)} – ${end.toLocaleTimeString(undefined, opts)}`;
  }
  return `${start.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })} → ${end.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })}`;
}
function eventDateBadge(ev) {
  const d = new Date(ev.starts_at);
  const mo = d.toLocaleDateString(undefined, { month: 'short' });
  const da = d.getDate();
  return `<div class="ev-date"><div class="mo">${escapeHtml(mo)}</div><div class="da">${da}</div></div>`;
}

let GALLERY = [];

function openLightbox(idx) {
  const lb = document.getElementById('lightbox');
  if (!lb) return;
  lb.dataset.idx = String(idx);
  const p = GALLERY[idx];
  if (!p) return;
  document.getElementById('lb-img').src = p.url;
  document.getElementById('lb-cap').textContent = p.caption || '';
  lb.classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox')?.classList.remove('open'); }
function lbStep(delta) {
  const lb = document.getElementById('lightbox');
  if (!lb) return;
  const cur = parseInt(lb.dataset.idx || '0', 10);
  const next = (cur + delta + GALLERY.length) % GALLERY.length;
  openLightbox(next);
}

document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (!lb || !lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') lbStep(-1);
  else if (e.key === 'ArrowRight') lbStep(+1);
});

function fmtHourLabel(hhmm) {
  if (!hhmm) return null;
  const m = String(hhmm).split(':');
  let h = parseInt(m[0], 10);
  if (!Number.isFinite(h)) return null;
  const ap = h < 12 ? 'A' : 'P';
  if (h === 0) h = 12; else if (h > 12) h -= 12;
  return m[1] === '00' ? `${h}${ap}` : `${h}:${m[1]}${ap}`;
}

function renderTenant(t, ps, posts, events, photos, documents) {
  GALLERY = photos || [];

  // Apply tenant primary color across the page (override --blue + --blue-2).
  const primary = ps?.branding?.primary_color;
  if (primary && /^#[0-9a-f]{6}$/i.test(primary)) {
    document.documentElement.style.setProperty('--blue', primary);
    // Compute a slightly darker --blue-2 by blending toward black 12%
    const hex = primary.slice(1);
    const r = parseInt(hex.slice(0,2), 16);
    const g = parseInt(hex.slice(2,4), 16);
    const b = parseInt(hex.slice(4,6), 16);
    const dim = (n) => Math.max(0, Math.round(n * 0.86)).toString(16).padStart(2, '0');
    document.documentElement.style.setProperty('--blue-2', `#${dim(r)}${dim(g)}${dim(b)}`);
  }

  // Coming-up = next 5 upcoming derived from the wider events list.
  const nowMs = Date.now();
  const upcoming = (events || []).filter(e => new Date(e.starts_at).getTime() >= nowMs).slice(0, 5);
  document.title = `${t.display_name} — ${ps?.club?.location || 'Poolside'}`;
  // If a logo is set, swap the topbar text for an image
  const logoUrl = ps?.branding?.logo_url;
  const nameEl = document.getElementById('club-name');
  if (logoUrl) {
    nameEl.innerHTML = `<img src="${escapeAttr(logoUrl)}" alt="${escapeAttr(t.display_name)}" style="max-height:32px;max-width:200px;display:block">`;
  } else {
    nameEl.textContent = t.display_name;
  }

  const hasPhoto = !!ps?.branding?.background_photo_url;
  if (hasPhoto) {
    document.getElementById('topbar').classList.add('translucent');
  }

  const eyebrow  = ps?.hero?.eyebrow;
  const headline = ps?.hero?.headline || t.display_name;
  const tagline  = ps?.hero?.tagline;
  const location = ps?.club?.location;
  const opens    = fmtTime12(ps?.pool?.opens_at);
  const closes   = fmtTime12(ps?.pool?.closes_at);

  const statusLabel = ({trial:'Free Trial', active:'Active', suspended:'Suspended', churned:'Closed'})[t.status] ?? t.status;
  const statusPill = t.status === 'trial' || t.status === 'suspended' || t.status === 'churned'
    ? `<span class="pill ${escapeHtml(t.status)} float">${escapeHtml(statusLabel)}</span>`
    : '';

  const bgStyle = hasPhoto
    ? `background-image: url('${escapeAttr(ps.branding.background_photo_url)}');`
    : '';

  const stripCells = [];
  if (opens && closes) stripCells.push(`<div class="stat"><div class="lbl">Today's hours</div><div class="val">${escapeHtml(opens)} – ${escapeHtml(closes)}</div></div>`);
  if (location)        stripCells.push(`<div class="stat"><div class="lbl">Where</div><div class="val">${escapeHtml(location)}</div></div>`);
  if (ps?.payments?.venmo_handle) stripCells.push(`<div class="stat"><div class="lbl">Venmo</div><div class="val">@${escapeHtml(ps.payments.venmo_handle)}</div></div>`);

  document.getElementById('root').innerHTML = `
    <section class="hero">
      <div class="hero-bg ${hasPhoto ? 'with-photo' : ''}" style="${bgStyle}"></div>
      ${statusPill}
      <div class="hero-inner">
        ${eyebrow ? `<div class="eyebrow">${escapeHtml(eyebrow)}</div>` : ''}
        <h1>${escapeHtml(headline)}</h1>
        ${tagline ? `<p class="tagline">${escapeHtml(tagline)}</p>` : ''}
        ${location ? `<p class="location">📍 ${escapeHtml(location)}</p>` : ''}
        <div class="actions">
          <a class="btn" href="/m/login.html">Member sign in</a>
          <a class="btn ghost" href="/apply.html">Apply for membership</a>
          ${ps?.payments?.venmo_handle
            ? `<a class="btn ghost" href="https://venmo.com/${escapeAttr(ps.payments.venmo_handle)}" target="_blank" rel="noopener">Pay dues via Venmo</a>`
            : ''}
        </div>
      </div>
    </section>
    ${stripCells.length ? `<section class="strip">${stripCells.join('')}</section>` : ''}
    ${(upcoming && upcoming.length) ? `
      <section class="events">
        <h2 style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap">
          Coming up
          <a href="https://sdewylbddkcvidwosgxo.supabase.co/functions/v1/tenant_calendar_ics?slug=${escapeAttr(t.slug)}"
             style="font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--blue);text-decoration:none;background:var(--blue-l);padding:6px 12px;border-radius:8px">
            📆 Subscribe to calendar
          </a>
        </h2>
        ${upcoming.map(ev => `
          <div class="ev">
            ${eventDateBadge(ev)}
            <div class="ev-body">
              <div class="ev-title">${escapeHtml(KIND_ICON[ev.kind] || '📅')} ${escapeHtml(ev.title)}</div>
              <div class="ev-meta">${escapeHtml(KIND_LABEL[ev.kind] || ev.kind)} · ${escapeHtml(fmtEventTime(ev))}</div>
              ${ev.location ? `<div class="ev-loc">📍 ${escapeHtml(ev.location)}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </section>
    ` : ''}
    <section class="events" style="padding-top: 8px">
      <h2>Full calendar</h2>
      <div id="public-calendar"></div>
    </section>
    ${(photos && photos.length) ? `
      <section class="gallery">
        <h2>Photos</h2>
        <div class="ggrid">
          ${photos.map((p, i) => `
            <div class="gtile" onclick="openLightbox(${i})">
              <img src="${escapeAttr(p.url)}" alt="${escapeAttr(p.caption || '')}" loading="lazy">
            </div>
          `).join('')}
        </div>
      </section>
    ` : ''}
    ${(documents && documents.length) ? `
      <section class="news">
        <h2>Documents</h2>
        ${documents.map(d => `
          <a href="${escapeAttr(d.url)}" target="_blank" rel="noopener" class="post" style="display:flex;gap:14px;align-items:center;text-decoration:none">
            <div style="font-size:28px;flex-shrink:0">${/\.pdf(\?|$)/i.test(d.url) ? '📄' : '📎'}</div>
            <div style="flex:1">
              <div class="post-title" style="font-size:16px">${escapeHtml(d.title)}</div>
              ${d.description ? `<div style="font-size:13px;color:var(--muted);margin-top:4px">${escapeHtml(d.description)}</div>` : ''}
            </div>
            <div style="color:var(--blue);font-size:14px;font-weight:600">↗</div>
          </a>
        `).join('')}
      </section>
    ` : ''}
    ${(posts && posts.length) ? `
      <section class="news">
        <h2>Latest news <span class="count">${posts.length} post${posts.length === 1 ? '' : 's'}</span></h2>
        ${posts.map(p => `
          <article class="post ${p.pinned ? 'pinned' : ''}">
            <h3 class="post-title">${escapeHtml(p.title)}${p.pinned ? '<span class="pin-pill">📌 Pinned</span>' : ''}</h3>
            <div class="post-meta">${escapeHtml(fmtPostDate(p.published_at))}</div>
            <div class="post-body">${escapeHtml(p.body)}</div>
          </article>
        `).join('')}
      </section>
    ` : ''}
  `;

  // Render the shared month-grid widget after the HTML is in place.
  const calOpens  = fmtHourLabel(ps?.pool?.opens_at);
  const calCloses = fmtHourLabel(ps?.pool?.closes_at);
  const openHoursLabel = (calOpens && calCloses) ? `${calOpens}–${calCloses}` : null;
  if (window.PoolsideCalendar) {
    PoolsideCalendar.render({
      rootEl: document.getElementById('public-calendar'),
      events: events || [],
      openHoursLabel,
    });
  }
}

(async () => {
  const slug = getSlugFromHostname();
  if (!slug) { renderNotFound(null); return; }
  try {
    const res = await fetch(PUBLIC_LOOKUP, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ slug }),
    });
    if (res.status === 404) { renderNotFound(slug); return; }
    const data = await res.json();
    if (!data.ok || !data.tenant) { renderNotFound(slug); return; }
    renderTenant(data.tenant, data.public_settings || {}, data.posts || [], data.events || [], data.photos || [], data.documents || []);
  } catch (e) {
    document.getElementById('root').innerHTML = `
      <div class="err">
        <h1 style="font-size:28px;margin-bottom:8px">Couldn't reach Poolside</h1>
        <p style="color:var(--red)">${escapeHtml(e.message || 'Network error')}</p>
        <p style="margin-top:18px"><a href="">Try again</a></p>
      </div>
    `;
  }
})();
</script>
</body>
</html>
