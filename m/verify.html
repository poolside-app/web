<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Signing in… — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --red:#dc2626;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.55 'Inter', system-ui, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 32px 22px;
  }
  .card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 18px; padding: 40px 32px; text-align: center;
    box-shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    max-width: 420px; width: 100%;
  }
  h1 { font-family:'Fraunces', Georgia, serif; font-weight:600; margin: 16px 0 6px; font-size: 22px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .err { color: var(--red); }
  .spinner {
    width: 40px; height: 40px; margin: 0 auto;
    border: 3px solid var(--blue-l); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn {
    display: inline-block; padding: 11px 22px; background: var(--blue);
    color: #fff; border: 0; border-radius: 10px; text-decoration: none;
    font: 600 14px 'Inter'; cursor: pointer; margin-top: 14px;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <h1>Signing you in…</h1>
  <p class="sub">Hang on a sec.</p>
</div>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const AUTH_URL = `${SUPABASE_URL}/functions/v1/member_auth`;

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function getSlugFromHostname() {
  const host = window.location.hostname;
  const m = host.match(/^([a-z0-9][a-z0-9-]*)\.poolsideapp\.com$/i);
  return m ? m[1].toLowerCase() : null;
}

function getTokenFromHash() {
  if (!window.location.hash.startsWith('#token=')) return null;
  return decodeURIComponent(window.location.hash.slice('#token='.length));
}

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <h1 class="err">Sign-in failed</h1>
    <p class="sub">${escapeHtml(msg)}</p>
    <a class="btn" href="/m/login.html">Try again</a>
  `;
}

(async () => {
  const slug = getSlugFromHostname();
  const token = getTokenFromHash();
  if (!token) { showError('No sign-in token in URL.'); return; }

  try {
    const res = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ action: 'verify', slug, token }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Could not verify the link');

    localStorage.setItem('poolside_member_token',  data.token);
    localStorage.setItem('poolside_member_user',   JSON.stringify(data.user));
    localStorage.setItem('poolside_member_tenant', JSON.stringify(data.tenant));
    history.replaceState(null, '', '/m/');
    window.location.href = '/m/';
  } catch (e) {
    showError(e.message);
  }
})();
</script>
</body>
</html>
