<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sign in — Poolside</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#0a3b5c; --blue-2:#134b73; --blue-l:#e6eef5; --sun:#f59e0b;
    --bg:#fefdfb; --bg-2:#f7f3eb; --text:#0f172a; --muted:#64748b;
    --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
    --shadow: 0 1px 2px rgba(10,59,92,.04), 0 8px 24px rgba(10,59,92,.06);
    --r-md: 12px; --r-lg: 18px;
  }
  *,*::before,*::after { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.55 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  a { color: var(--blue); }
  h1, h2 { font-family:'Fraunces', Georgia, serif; font-weight:600; letter-spacing:-.015em; margin:0; }
  h1 { font-size: 28px; line-height: 1.1; }
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px;
    color: var(--blue); text-decoration: none;
  }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--sun),#fbbf24); box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
  header { padding: 18px 22px; border-bottom: 1px solid var(--border); background:#fff; }
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 32px 22px;
  }
  .card {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 32px 28px;
    box-shadow: var(--shadow); max-width: 440px; width: 100%;
  }
  .lede { color: var(--muted); margin: 8px 0 22px; font-size: 14px; }
  label { font-weight: 600; font-size: 12px; display: block; margin: 14px 0 6px; }
  input {
    width: 100%; padding: 12px 14px; font: 15px/1.4 'Inter', sans-serif;
    border: 1.5px solid var(--border); border-radius: var(--r-md);
    background: #fff; color: var(--text);
  }
  input:focus { outline: 0; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-l); }
  .btn {
    display: block; width: 100%; padding: 13px;
    background: var(--blue); color: #fff; border: 0; border-radius: var(--r-md);
    font: 600 15px 'Inter', sans-serif; cursor: pointer; margin-top: 22px;
  }
  .btn:hover { background: var(--blue-2); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .err { display:none; margin-top:14px; padding:10px 14px; font-size:13px;
         background:#fee2e2; border:1px solid #fecaca; color:#7f1d1d; border-radius:10px; }
  .err.show { display: block; }
  .ok { display:none; margin-top:14px; padding:14px; font-size:14px;
        background:#dcfce7; border:1px solid #86efac; color:#14532d; border-radius:10px; }
  .ok.show { display: block; }
  .dev {
    display:none; margin-top:14px; padding:14px; font-size:13px;
    background:#fef3c7; border:1px solid #fde68a; color:#78350f; border-radius:10px;
  }
  .dev.show { display: block; }
  .dev a {
    display: inline-block; margin-top: 8px; background: var(--blue); color: #fff;
    padding: 8px 14px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 13px;
  }
  .small { font-size: 13px; color: var(--muted); text-align: center; margin-top: 18px; }
  footer { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="/" class="logo" id="brand-link"><span class="logo-dot"></span> <span id="brand-name">…</span></a>
  <script>
    (function () {
      var slugMatch = window.location.hostname.match(/^([a-z0-9][a-z0-9-]*)\.poolsideapp\.com$/i);
      var slug = slugMatch && slugMatch[1] && slugMatch[1] !== 'www' ? slugMatch[1] : null;
      var cached = null;
      try { cached = JSON.parse(localStorage.getItem('poolside_tenant_brand') || 'null'); } catch (_) {}
      var el = document.getElementById('brand-name');
      if (!el) return;
      if (cached && cached.slug === slug && cached.display_name) el.textContent = cached.display_name;
      else if (slug) el.textContent = slug.charAt(0).toUpperCase() + slug.slice(1);
      else el.textContent = '';
    })();
  </script>
</header>
<main>
  <form class="card" onsubmit="event.preventDefault(); doStart()">
    <h1 id="title">Member sign in</h1>
    <p class="lede" id="sub">Enter the email your club has on file. We'll send you a one-time sign-in link.</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" required placeholder="you@example.com">

    <button class="btn" id="submit" type="submit">Send me a link</button>

    <div id="err" class="err"></div>
    <div id="ok" class="ok"></div>
    <div id="dev" class="dev"></div>

    <p class="small">Are you an admin? <a href="/club/admin/login.html">Sign in here →</a></p>
  </form>
</main>
<footer>Powered by <a href="https://poolsideapp.com">Poolside</a></footer>

<script>
const SUPABASE_URL = 'https://sdewylbddkcvidwosgxo.supabase.co';
const AUTH_URL = `${SUPABASE_URL}/functions/v1/member_auth`;
const TENANT_LOOKUP = `${SUPABASE_URL}/functions/v1/tenant_public`;

function getSlugFromHostname() {
  const host = window.location.hostname;
  const m = host.match(/^([a-z0-9][a-z0-9-]*)\.poolsideapp\.com$/i);
  if (!m) return null;
  if (['www','admin','api','app'].includes(m[1].toLowerCase())) return null;
  return m[1].toLowerCase();
}
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return String(s ?? '').replace(/["']/g, c => ({'"':'&quot;',"'":'&#39;'}[c])); }

const SLUG = getSlugFromHostname();

(async () => {
  if (!SLUG) {
    document.getElementById('title').textContent = 'Wrong page';
    document.getElementById('sub').textContent = "This sign-in is for tenant clubs only. Visit your club's subdomain.";
    document.getElementById('email').disabled = true;
    document.getElementById('submit').disabled = true;
    return;
  }
  try {
    const res = await fetch(TENANT_LOOKUP, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ slug: SLUG }),
    });
    if (res.ok) {
      const data = await res.json();
      if (data.ok && data.tenant) {
        document.title = `Sign in — ${data.tenant.display_name}`;
        document.getElementById('title').textContent = `Sign in to ${data.tenant.display_name}`;
        const brand = document.getElementById('brand-name');
        if (brand) brand.textContent = data.tenant.display_name;
        const logoUrl = data.public_settings && data.public_settings.branding && data.public_settings.branding.logo_url;
        if (logoUrl) {
          const link = document.getElementById('brand-link');
          const safe = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
          if (link) link.innerHTML = `<img src="${safe(logoUrl)}" alt="${safe(data.tenant.display_name)}" style="height:24px;width:24px;object-fit:cover;border-radius:6px"> <span id="brand-name">${safe(data.tenant.display_name)}</span>`;
        }
      }
    }
  } catch { /* keep generic title */ }
})();

async function doStart() {
  const btn = document.getElementById('submit');
  const errEl = document.getElementById('err');
  const okEl  = document.getElementById('ok');
  const devEl = document.getElementById('dev');
  errEl.classList.remove('show'); okEl.classList.remove('show'); devEl.classList.remove('show');

  const email = document.getElementById('email').value.trim().toLowerCase();
  if (!SLUG) { errEl.textContent = 'No club detected from URL.'; errEl.classList.add('show'); return; }
  if (!email) { errEl.textContent = 'Email is required.'; errEl.classList.add('show'); return; }

  btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Sending…';
  try {
    const res = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ action: 'start', slug: SLUG, email }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Could not send a sign-in link');

    if (data.dev_link) {
      devEl.innerHTML = `<b>Email is not configured yet.</b><br>${escapeHtml(data.message || '')}<br><a href="${escapeAttr(data.dev_link)}">Click here to sign in →</a>`;
      devEl.classList.add('show');
    } else {
      okEl.innerHTML = `✓ ${escapeHtml(data.message || 'A sign-in link is on the way.')} Open the email and click the link to finish signing in.`;
      okEl.classList.add('show');
    }
    document.getElementById('email').value = '';
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}
</script>
</body>
</html>
